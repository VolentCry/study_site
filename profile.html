<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Minecraft Underwater School</title>
    
    <!-- Подключаем тот же пиксельный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* --- ПЕРЕМЕННЫЕ ЦВЕТОВ (как на главной) --- */
        :root {
            --color-light: #c5d0e6;
            --color-med: #a1b3d7;
            --color-dark: #7e96c7;
            --color-sand: #c7ba7e;
            --text-color: #ffffff;
            --frame-bg: rgba(62, 78, 110, 0.85);
            --correct: #55ff55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Press Start 2P', cursive;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a2a42, #0d1624); /* Подводный фон */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- КАРТОЧКА ПРОФИЛЯ --- */
        .profile-card {
            background: var(--frame-bg);
            border: 4px solid var(--color-light);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
            max-width: 450px;
            width: 90%;
        }

        .nickname {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #000;
            color: var(--color-sand);
        }

        /* --- КРУГЛАЯ РАМКА ДЛЯ ФОТО --- */
        .avatar-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            border: 6px solid var(--color-light);
            overflow: hidden;
            background-color: var(--color-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 60px;
            color: rgba(255,255,255,0.4);
            text-shadow: none;
        }

        /* --- СТАТИСТИКА --- */
        .stats {
            font-size: 12px;
            line-height: 2;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .stats span {
            color: var(--correct);
            font-size: 24px;
            display: inline-block;
            margin-top: 10px;
            text-shadow: 1px 1px 0 #000;
        }

        /* --- КНОПКА ВОЗВРАТА --- */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--color-med);
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .back-btn:hover {
            background: var(--color-med);
            color: #000;
        }

        /* --- ПУЗЫРЬКИ --- */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: floatUp infinite linear;
            z-index: 1;
        }
        .bubble-square { border-radius: 20%; }
        
        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="nickname">Игрок_Стив</div>
        
        <div class="avatar-container">
            <!-- Если у вас есть картинка, раскомментируйте тег <img> ниже и удалите div заглушки -->
            <div class="avatar-placeholder">?</div>
            <!-- <img src="URL_ИЛИ_ПУТЬ_К_КАРТИНКЕ.jpg" alt="Фото профиля"> -->
        </div>
        
        <div class="stats">
            Всего решено задач:<br>
            <span id="tasks-count">0</span>
        </div>
        
        <a href="english_page.html" class="back-btn">< Назад к урокам</a>
    </div>

    <script>
        // Инициализация при загрузке страницы
        window.onload = () => {
            // Читаем количество решённых задач из localStorage (сохранено в вашем english_page.html)
            const tasksCountElement = document.getElementById('tasks-count');
            const savedTasks = localStorage.getItem('totalSolvedTasks');
            
            if (savedTasks !== null) {
                tasksCountElement.innerText = savedTasks;
            }

            // Запускаем анимацию пузырьков для красоты
            createBubbles();
        };

        // Генерация пузырьков (как в основном файле)
        function createBubbles() {
            const body = document.body;
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble', 'bubble-square');
                const size = Math.random() * 30 + 10 + 'px';
                bubble.style.width = size; bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                body.appendChild(bubble);
            }
        }
    </script>
</body>
</html>
