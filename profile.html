<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Minecraft Underwater School</title>
    
    <!-- Подключаем тот же пиксельный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* --- ПЕРЕМЕННЫЕ ЦВЕТОВ (как на главной) --- */
        :root {
            --color-light: #c5d0e6;
            --color-med: #a1b3d7;
            --color-dark: #7e96c7;
            --color-sand: #c7ba7e;
            --text-color: #ffffff;
            --frame-bg: rgba(62, 78, 110, 0.85);
            --correct: #55ff55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Press Start 2P', cursive;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a2a42, #0d1624); /* Подводный фон */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- КАРТОЧКА ПРОФИЛЯ --- */
        .profile-card {
            background: var(--frame-bg);
            border: 4px solid var(--color-light);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
            max-width: 450px;
            width: 90%;
        }

        .nickname {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #000;
            color: var(--color-sand);
        }

        /* --- КРУГЛАЯ РАМКА ДЛЯ ФОТО --- */
        .avatar-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            border: 6px solid var(--color-light);
            overflow: hidden;
            background-color: var(--color-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 60px;
            color: rgba(255,255,255,0.4);
            text-shadow: none;
        }

        /* --- СТАТИСТИКА --- */
        .stats {
            font-size: 12px;
            line-height: 2;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .stats span {
            color: var(--correct);
            font-size: 24px;
            display: inline-block;
            margin-top: 10px;
            text-shadow: 1px 1px 0 #000;
        }

        /* --- КНОПКА ВОЗВРАТА --- */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--color-med);
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .back-btn:hover {
            background: var(--color-med);
            color: #000;
        }

        /* --- ФОРМЫ ВХОДА И РЕГИСТРАЦИИ --- */
        .auth-section {
            text-align: left;
        }

        .auth-section h2 {
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--color-sand);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            margin-bottom: 8px;
            color: var(--color-light);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            border: 3px solid var(--color-med);
            background: rgba(0,0,0,0.5);
            color: var(--text-color);
            border-radius: 4px;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-sand);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            border: 3px solid var(--color-med);
            background: rgba(0,0,0,0.6);
            color: var(--text-color);
            transition: 0.2s ease;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: var(--color-med);
            color: #000;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
        }

        .auth-switch a {
            color: var(--color-sand);
            cursor: pointer;
            text-decoration: underline;
        }

        .auth-switch a:hover {
            color: var(--color-light);
        }

        .auth-error {
            font-size: 9px;
            color: #ff6666;
            margin-top: 10px;
            text-align: center;
        }

        .auth-success {
            font-size: 9px;
            color: var(--correct);
            margin-top: 10px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .logout-btn {
            margin-top: 15px;
            padding: 10px 15px;
            font-size: 10px;
        }

        /* --- ПУЗЫРЬКИ --- */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: floatUp infinite linear;
            z-index: 1;
        }
        .bubble-square { border-radius: 20%; }
        
        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Форма входа -->
    <div id="auth-container" class="profile-card auth-section">
        <div id="login-form">
            <h2>Вход в аккаунт</h2>
            <form id="login-submit">
                <div class="form-group">
                    <label for="login-name">Имя (логин)</label>
                    <input type="text" id="login-name" placeholder="Введите имя" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль" autocomplete="current-password" required>
                </div>
                <button type="submit" class="auth-btn">Войти</button>
                <div id="login-error" class="auth-error hidden"></div>
            </form>
            <div class="auth-switch">
                Нет аккаунта? <a id="show-register">Регистрация</a>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <h2>Регистрация</h2>
            <form id="register-submit">
                <div class="form-group">
                    <label for="reg-name">Имя (логин)</label>
                    <input type="text" id="reg-name" placeholder="Придумайте имя" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label for="reg-password2">Повторите пароль</label>
                    <input type="password" id="reg-password2" placeholder="Повторите пароль" autocomplete="new-password" required>
                </div>
                <button type="submit" class="auth-btn">Зарегистрироваться</button>
                <div id="register-message" class="auth-success hidden"></div>
            </form>
            <div class="auth-switch">
                Уже есть аккаунт? <a id="show-login">Вход</a>
            </div>
        </div>
    </div>

    <!-- Профиль (показывается после входа) -->
    <div id="profile-container" class="profile-card hidden">
        <div class="nickname" id="profile-nickname">Игрок_Стив</div>
        
        <div class="avatar-container">
            <div class="avatar-placeholder">?</div>
        </div>
        
        <div class="stats">
            Всего решено задач:<br>
            <span id="tasks-count">0</span>
        </div>
        
        <a href="index.html" class="back-btn">< Назад к урокам</a>
        <button type="button" class="back-btn logout-btn" id="logout-btn">Выйти</button>
    </div>

    <script>
        const AUTH_STUB = { name: 'Roma', password: '12345' };
        const STORAGE_KEY = 'loggedInUser';

        function showAuth() {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('profile-container').classList.add('hidden');
        }

        function showProfile(userName) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('profile-container').classList.remove('hidden');
            document.getElementById('profile-nickname').innerText = userName;
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('login-name').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('login-error').classList.add('hidden');
            showAuth();
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        }

        // Инициализация при загрузке страницы
        window.onload = () => {
            const tasksCountElement = document.getElementById('tasks-count');
            const savedTasks = localStorage.getItem('totalSolvedTasks');
            if (savedTasks !== null) {
                tasksCountElement.innerText = savedTasks;
            }

            const savedUser = localStorage.getItem(STORAGE_KEY);
            if (savedUser) {
                showProfile(savedUser);
            } else {
                showAuth();
            }

            createBubbles();

            // Вход
            document.getElementById('login-submit').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('login-name').value.trim();
                const password = document.getElementById('login-password').value;
                const errEl = document.getElementById('login-error');

                if (name === AUTH_STUB.name && password === AUTH_STUB.password) {
                    localStorage.setItem(STORAGE_KEY, name);
                    errEl.classList.add('hidden');
                    showProfile(name);
                } else {
                    errEl.textContent = 'Неверное имя или пароль. Пока нет БД — только вход: Roma / 12345';
                    errEl.classList.remove('hidden');
                }
            });

            // Регистрация (заглушка — БД нет)
            document.getElementById('register-submit').addEventListener('submit', (e) => {
                e.preventDefault();
                const msg = document.getElementById('register-message');
                msg.textContent = 'Регистрация временно недоступна (база данных не подключена).';
                msg.classList.remove('hidden');
            });

            document.getElementById('show-register').addEventListener('click', () => {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
                document.getElementById('register-message').classList.add('hidden');
            });

            document.getElementById('show-login').addEventListener('click', () => {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            });

            document.getElementById('logout-btn').addEventListener('click', logout);
        };

        function createBubbles() {
            const body = document.body;
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble', 'bubble-square');
                const size = Math.random() * 30 + 10 + 'px';
                bubble.style.width = size; bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                body.appendChild(bubble);
            }
        }
    </script>
</body>
</html>
