<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>
            Классификация звёзд по светимости
        </title>

        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
        
        <style>
            *{margin:0;padding:0;box-sizing:border-box;}
            body{
            background:#080b18;
            font-family:'Raleway',sans-serif;
            overflow:hidden;width:100vw;height:100vh;
            cursor:grab;user-select:none;
            }
            body.drag{cursor:grabbing;}
            canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
            #viewport{
            position:absolute;top:0;left:0;
            width:5200px;height:2800px;
            z-index:1;transform-origin:0 0;
            }
            #arrowSvg{
            position:absolute;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:1;overflow:visible;
            }
            .nd{
            position:absolute;border-radius:8px;padding:7px 12px;
            font-size:12px;font-weight:500;text-align:center;line-height:1.35;
            cursor:pointer;z-index:2;border:1px solid transparent;
            transition:transform .18s ease, box-shadow .18s ease;
            display:flex;align-items:center;justify-content:center;
            }
            .nd:hover{
            transform:translateY(-4px) scale(1.04);
            box-shadow:0 14px 40px rgba(0,0,0,.7),0 0 22px var(--gl,rgba(255,255,255,.15));
            z-index:20!important;
            }
            .nd.hdr{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;
            cursor:default;border-radius:5px;padding:6px 10px;
            background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);
            color:rgba(255,255,255,.45);}
            .nd.hdr:hover{transform:none;box-shadow:none;}
            .nd.dim{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);
            color:rgba(180,180,200,.4);cursor:default;font-size:10px;}
            .nd.dim:hover{transform:none;box-shadow:none;}

            .c-root {background:linear-gradient(135deg,#1a1030,#251845);border-color:#6040a0;color:#d0b0ff;--gl:rgba(180,100,255,.4);}
            .c-neb  {background:linear-gradient(135deg,#14203a,#1e2d55);border-color:#3a5080;color:#8ab4e8;--gl:rgba(100,150,255,.3);}
            .c-blue {background:linear-gradient(135deg,#0d2035,#103050);border-color:#2a6090;color:#6db8ff;--gl:rgba(80,160,255,.35);}
            .c-lb   {background:linear-gradient(135deg,#0a1a30,#102040);border-color:#205070;color:#50a0d8;--gl:rgba(60,140,230,.3);}
            .c-ora  {background:linear-gradient(135deg,#2a1a0a,#3d2510);border-color:#8a5020;color:#e8a060;--gl:rgba(255,150,50,.3);}
            .c-red  {background:linear-gradient(135deg,#2a0f0f,#3d1515);border-color:#8a2020;color:#f07070;--gl:rgba(255,80,80,.3);}
            .c-yel  {background:linear-gradient(135deg,#201a05,#2e270a);border-color:#7a6510;color:#e8d070;--gl:rgba(255,220,50,.25);}
            .c-wht  {background:linear-gradient(135deg,#1a1a25,#22222f);border-color:#5a5a7a;color:#c8c8e8;--gl:rgba(200,200,255,.25);}
            .c-grn  {background:linear-gradient(135deg,#0a1f10,#0f2d18);border-color:#2a6040;color:#60c880;--gl:rgba(80,200,100,.25);}
            .c-pur  {background:linear-gradient(135deg,#1a0f2a,#25153d);border-color:#5a3090;color:#b080e8;--gl:rgba(160,80,255,.3);}
            .c-tel  {background:linear-gradient(135deg,#081f1f,#0f2d2d);border-color:#206060;color:#50c0c0;--gl:rgba(50,190,190,.25);}

            #backBtn{
            position:fixed;top:22px;left:22px;z-index:1000;
            display:flex;align-items:center;gap:7px;
            padding:9px 18px;background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.14);border-radius:30px;
            color:#bbb;font-family:'Raleway',sans-serif;font-size:12px;
            font-weight:500;letter-spacing:.05em;cursor:pointer;
            backdrop-filter:blur(10px);text-decoration:none;transition:all .2s;
            }
            #backBtn:hover{background:rgba(255,255,255,.13);color:#fff;transform:translateX(-2px);}
            #backBtn svg{width:15px;height:15px;}
            #pgTitle{
                position:fixed;top:24px;left:50%;transform:translateX(-50%);
                z-index:100;font-family:'Cinzel',serif;font-size:12px;
                font-weight:600;letter-spacing:.22em;color:rgba(255,255,255,.3);
                pointer-events:none;text-transform:uppercase;white-space:nowrap;
            }
            #hint{
                position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
                z-index:100;font-size:10px;color:rgba(255,255,255,.16);
                letter-spacing:.1em;pointer-events:none;
            }

            /* MODAL */
            #mOv{display:none;position:fixed;inset:0;z-index:2000;
            background:rgba(5,7,18,.9);backdrop-filter:blur(18px);}
            #mOv.on{display:flex;align-items:center;justify-content:center;
            animation:fIn .22s ease;}
            @keyframes fIn{from{opacity:0}to{opacity:1}}
            #mBox{
            position:relative;width:calc(100vw - 100px);height:calc(100vh - 100px);
            background:linear-gradient(145deg,#0e1020,#141828,#0e1020);
            border:1px solid rgba(255,255,255,.1);border-radius:18px;
            overflow:hidden;animation:sUp .28s cubic-bezier(.34,1.56,.64,1);
            display:flex;flex-direction:column;align-items:center;
            justify-content:center;padding:60px 80px;gap:26px;
            }
            @keyframes sUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
            #mBox::before,#mBox::after{
            content:'';position:absolute;width:55px;height:55px;
            border-color:rgba(255,255,255,.06);border-style:solid;
            }
            #mBox::before{top:14px;left:14px;border-width:1px 0 0 1px;border-radius:3px 0 0 0;}
            #mBox::after{bottom:14px;right:14px;border-width:0 1px 1px 0;border-radius:0 0 3px 0;}
            #mClose{
            position:absolute;top:18px;right:18px;width:36px;height:36px;
            border-radius:50%;background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);
            font-size:17px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;transition:all .2s;
            }
            #mClose:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.1);}
            #mIcon{
            width:170px;height:170px;border-radius:50%;flex-shrink:0;
            border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);
            display:flex;align-items:center;justify-content:center;
            font-size:68px;position:relative;
            }
            #mIcon::before{
            content:'';position:absolute;inset:-18px;border-radius:50%;
            background:radial-gradient(circle,var(--mgl,rgba(150,100,255,.2)) 0%,transparent 70%);
            animation:pulse 3s ease-in-out infinite;
            }
            @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
            #mTitle{
            font-family:'Cinzel',serif;font-size:clamp(19px,3vw,32px);
            font-weight:700;color:#fff;text-align:center;letter-spacing:.05em;
            }
            #mDesc{
            font-size:14px;line-height:1.9;color:rgba(200,195,220,.82);
            max-width:660px;text-align:center;font-weight:300;letter-spacing:.02em;
            }
            #mTags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
            .tag{padding:4px 12px;border-radius:20px;font-size:10px;
            letter-spacing:.08em;font-weight:600;text-transform:uppercase;
            background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
            color:rgba(255,255,255,.42);}
        </style>
    </head>
    <body>
        <canvas id="bg"></canvas>
        <a href="/" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Назад
        </a>
        <div id="pgTitle">Классификация звёзд по светимости</div>
        <div id="hint">Перетащите для навигации · Нажмите на блок для подробностей</div>
        <div id="viewport"><svg id="arrowSvg"></svg></div>

        <div id="mOv">
        <div id="mBox">
            <button id="mClose">✕</button>
            <div id="mIcon"><span id="mEmoji"></span></div>
            <div id="mTitle"></div>
            <div id="mDesc"></div>
            <div id="mTags"></div>
        </div>
        </div>

        <script>
            // ── STARFIELD ────────────────────────────────────────────────────
            const bc=document.getElementById('bg');
            const bx=bc.getContext('2d');
            function rsz(){bc.width=innerWidth;bc.height=innerHeight;}
            rsz();window.addEventListener('resize',rsz);
            const ST=Array.from({length:240},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,r:Math.random()*1.2,a:Math.random(),sp:Math.random()*.003+.001}));
            (function af(){bx.clearRect(0,0,bc.width,bc.height);ST.forEach(s=>{s.a+=s.sp;bx.beginPath();bx.arc(s.x,s.y,s.r,0,Math.PI*2);bx.fillStyle=`rgba(200,210,255,${.12+.4*Math.abs(Math.sin(s.a))})`;bx.fill();});requestAnimationFrame(af);})();

            // ── INFO DATABASE ────────────────────────────────────────────────
            const DB={
            'Газопылевое облако':{e:'🌫️',g:'rgba(120,100,70,.4)',t:['Молекулярное облако','Газ и пыль','Гравитация'],d:'Газопылевые (молекулярные) облака — плотные скопления газа (преимущественно водород и гелий) и межзвёздной пыли. Именно из них рождаются звёзды: под действием гравитации или внешнего возмущения облако фрагментируется и даёт начало протозвёздным ядрам. Типичная масса облака — сотни и тысячи солнечных масс.'},
            'Протозвезда':{e:'🟤',g:'rgba(160,110,60,.45)',t:['Ранняя стадия','Контракция Кельвина–Гельмгольца','Диск аккреции'],d:'Протозвезда образуется при гравитационном коллапсе фрагмента молекулярного облака. Ядро разогревается, но термоядерные реакции ещё не идут — светимость обеспечивается гравитационным сжатием. Окружена вращающимся диском аккреции, из которого могут формироваться планеты. Длительность стадии — от тысяч до миллиона лет.'},
            'Звёзды класс M':{e:'🔴',g:'rgba(220,70,50,.4)',t:['Красные карлики','0.08–0.5 М☉','Долгожители'],d:'Звёзды класса M — красные карлики, самые многочисленные звёзды Галактики (~70% всех звёзд). Температура поверхности 2400–3700 К, масса 0.08–0.5 М☉. Живут триллионы лет — дольше нынешнего возраста Вселенной. Ближайшая к Солнцу звезда — Проксима Центавра — класс M5.'},
            'Звёзды класс G, K, F, A':{e:'☀️',g:'rgba(255,215,80,.4)',t:['G: Солнце 5800 К','K: оранжевые','F/A: горячее Солнца'],d:'Звёзды классов A, F, G, K — основная масса «средних» звёзд на главной последовательности. G (Солнце, 5800 К) — жёлтые; K — оранжевые (3900–5200 К); F — желто-белые (6000–7600 К); A — белые (7600–10000 К). Все сжигают водород в гелий, живут от нескольких сотен миллионов до нескольких десятков миллиардов лет.'},
            'Звёзды класс B, O (8–50 М☉)':{e:'💙',g:'rgba(80,150,255,.5)',t:['Горячие','Массивные','10 000–50 000 К'],d:'Звёзды классов B и O на главной последовательности с массой 8–50 М☉. Класс B: 10 000–30 000 К; класс O: >30 000 К. Их светимость в тысячи и сотни тысяч раз выше солнечной. Живут лишь миллионы лет. Ионизируют межзвёздный газ, создавая туманности HII. Большинство ярчайших звёзд ночного неба относятся к этим классам.'},
            'Звёзды класс O (> 50 М☉)':{e:'🔵',g:'rgba(60,120,255,.55)',t:['Класс O','Масса >50 М☉','> 30 000 К'],d:'Наиболее горячие и массивные звёзды главной последовательности. Температура поверхности превышает 30 000–50 000 К, светимость — до миллиона солнечных. Мощными звёздными ветрами разгоняют и ионизируют окружающий газ. Живут 1–3 миллиона лет, после чего взрываются сверхновой или переходят в гипергиганты.'},
            'Гл. посл. (M-класс)':{e:'🔴',g:'rgba(200,60,40,.4)',t:['Главная последовательность','Класс M','Медленный синтез'],d:'Красные карлики на главной последовательности — наиболее стабильные и долгоживущие звёзды. Сжигают водород очень медленно, конвекция перемешивает всё вещество звезды. Из-за малой массы никогда не станут красными гигантами — просто постепенно превратятся в белый карлик, минуя стадию гиганта.'},
            'Гл. посл. (G,K,F,A)':{e:'⭐',g:'rgba(255,200,80,.4)',t:['Синтез H→He','Миллиарды лет','Стабильная'],d:'Главная последовательность — самый долгий этап жизни звезды средней массы. Термоядерный синтез водорода в гелий в ядре уравновешивает гравитацию. Для звёзд 0.5–8 М☉ эта стадия длится от 1 до 100+ млрд лет в зависимости от массы. Солнце находится на ГП уже 4.6 млрд лет и пробудет ещё примерно столько же.'},
            'Гл. посл. (B, O)':{e:'🌠',g:'rgba(80,150,255,.45)',t:['Главная последовательность','Класс B/O','CNO-цикл'],d:'Массивные звёзды на главной последовательности сжигают водород преимущественно по CNO-циклу. Их ядра содержат конвективные зоны; звезда быстро обогащается гелием. Из-за огромной светимости топливо расходуется за миллионы лет. Когда водород иссякает, звезда быстро эволюционирует в сверхгигант.'},
            'Субгигант':{e:'🟡',g:'rgba(220,180,60,.4)',t:['Переходная стадия','Расход ядерного топлива','Расширение'],d:'Субгигант — переходная стадия между главной последовательностью и гигантом. Водород в ядре исчерпан, синтез переходит в оболочку; ядро сжимается, а внешние слои расширяются. Светимость растёт. Солнце через ~5 млрд лет станет субгигантом, увеличившись в ~1.5–2 раза.'},
            'Красный карлик':{e:'🔴',g:'rgba(220,50,40,.4)',t:['Класс M','0.08–0.5 М☉','Долгожитель'],d:'Красный карлик — конечная стадия эволюции звёзд класса M на главной последовательности (или сама ГП для них). Из-за малой массы звезда полностью конвективна и сжигает топливо очень медленно. Красные карлики будут светить ещё триллионы лет. В конечном счёте они остынут, превратившись в гипотетический «белый карлик» из гелия (без прохождения через стадию гиганта).'},
            'Красный гигант':{e:'🔴',g:'rgba(255,70,40,.5)',t:['Расширение','Гелиевый синтез','Конец ГП'],d:'Красный гигант — стадия эволюции звёзд 0.5–8 М☉ после исчерпания водорода в ядре. Ядро сжимается и разогревается, а внешние оболочки расширяются до сотен радиусов Солнца. Температура поверхности падает до 3500–5000 К. В ядре начинается тройной альфа-процесс (синтез гелия в углерод). Солнце поглотит Меркурий и Венеру.'},
            'Горизонтальная ветвь':{e:'🌡️',g:'rgba(210,150,60,.35)',t:['Стабильное горение He','После вспышки He','~100 млн лет'],d:'Горизонтальная ветвь — стадия стабильного горения гелия в ядре звезды малой/средней массы после вспышки гелия на вершине ветви красных гигантов. Звезда имеет примерно постоянную светимость. Многие нестабильные переменные (RR Лиры) находятся на этой стадии. Длится около 100 миллионов лет.'},
            'АГБ-звезда':{e:'🌺',g:'rgba(220,100,60,.4)',t:['Асимптотическая ветвь','Пульсации','Мириды'],d:'АГБ-звезда (Асимптотическая ветвь гигантов) — поздняя стадия звёзд малой/средней массы. Одновременно горят оболочки — водородная и гелиевая. Звезда пульсирует: это мириды и длиннопериодические переменные. Мощный ветер постепенно сдувает внешние оболочки, создавая будущую планетарную туманность.'},
            'Планетарная туманность':{e:'🌀',g:'rgba(70,200,150,.45)',t:['Сброс оболочки','Ионизированный газ','~10 000 лет'],d:'Планетарная туманность — светящаяся оболочка ионизированного газа, сброшенная звездой средней массы на стадии АГБ. В центре — горячий белый карлик, чьё УФ-излучение ионизирует газ. Туманность существует около 10 000 лет, затем рассеивается. Примеры: Туманность Кольцо (M57), Туманность Кошачий Глаз.'},
            'Белый карлик':{e:'💠',g:'rgba(150,170,255,.5)',t:['Предел 1.4 М☉','Давление вырожд. электронов','Остывание'],d:'Белый карлик — конечный этап звёзд с массой до ~8 М☉. Размером с Землю, масса ~0.6 М☉. Поддерживается давлением вырожденного электронного газа. Без термоядерных реакций — лишь медленно остывает. Предел Чандрасекара: 1.4 М☉. При накоплении вещества сверх предела в двойной системе — взрыв сверхновой Ia.'},
            'Чёрный карлик':{e:'⬛',g:'rgba(70,70,90,.3)',t:['Гипотетический','Остывший белый карлик','> 10¹⁴ лет'],d:'Чёрный карлик — гипотетическое конечное состояние белого карлика, полностью остывшего до температуры реликтового фона. Время остывания ~10¹⁴ лет и более, что намного превышает возраст Вселенной (13.8 млрд лет). Чёрных карликов в наблюдаемой Вселенной пока не существует — это чисто теоретический объект.'},
            'Вспышка новой':{e:'💫',g:'rgba(255,200,70,.5)',t:['Двойная система','Белый карлик','Термоядерный взрыв'],d:'Новая звезда — термоядерный взрыв на поверхности белого карлика в тесной двойной системе. Вещество от компаньона накапливается до критической температуры и взрывается. Яркость растёт в тысячи раз. Белый карлик выживает — процесс может повторяться («повторная новая»). В отличие от сверхновой, звезда не разрушается.'},
            'Сверхновая типа Ia':{e:'💥',g:'rgba(255,140,40,.55)',t:['Стандартная свеча','Белый карлик > 1.4 М☉','Ускорение Вселенной'],d:'Сверхновая типа Ia — термоядерный взрыв белого карлика, накопившего массу сверх предела Чандрасекара (1.4 М☉). Весь белый карлик взрывается, остатков нет. Стандартная пиковая светимость делает их «стандартными свечами» для измерения расстояний. Именно с их помощью в 1998 г. открыли ускоренное расширение Вселенной.'},
            'Голубой сверхгигант':{e:'🔷',g:'rgba(70,130,255,.5)',t:['Класс B/O I','Горячий','Ригель'],d:'Голубой сверхгигант — массивная звезда (10–100 М☉) после главной последовательности. Температура 10 000–50 000 К. Ригель (β Ориона) — классический пример: светимость в 120 000 раз выше солнечной, масса ~21 М☉. Стадия короткая; звезда быстро эволюционирует в жёлтый или красный сверхгигант.'},
            'Жёлтый сверхгигант':{e:'🌟',g:'rgba(255,220,70,.4)',t:['Переходная','Цефеиды','5000–8000 К'],d:'Жёлтый сверхгигант — промежуточный этап между голубым и красным сверхгигантом. Температура 5000–8000 К. Многие являются цефеидами — переменными с периодом 1–70 суток. Полярная звезда (α Малой Медведицы) — жёлтый сверхгигант-цефеида. Эта стадия крайне нестабильна и нередко сопровождается значительными выбросами вещества.'},
            'Красный сверхгигант':{e:'🟠',g:'rgba(220,70,30,.5)',t:['Масса 8–35 М☉','Бетельгейзе','Крупнейшие звёзды'],d:'Красный сверхгигант — самые крупные звёзды Вселенной по размеру. Образуются из звёзд 8–35 М☉. Радиус в 500–1500 раз превышает солнечный. Бетельгейзе (~900 R☉) может взорваться в ближайшие 100 000 лет. Температура поверхности 3000–4500 К. Стадия предшествует взрыву сверхновой типа II.'},
            'Сверхновая (Тип II)':{e:'💥',g:'rgba(255,120,30,.6)',t:['Коллапс ядра','Нейтрино','10⁴⁴ Дж'],d:'Сверхновая типа II — взрыв при коллапсе ядра массивной звезды (>8 М☉). Железное ядро достигает предела Чандрасекара и мгновенно коллапсирует. 99% энергии уносится нейтрино. За секунды светимость превышает светимость целой галактики. В остатке — нейтронная звезда или чёрная дыра. Синтезируются тяжёлые элементы вплоть до железа и выше.'},
            'Нейтронная звезда':{e:'💫',g:'rgba(60,200,220,.5)',t:['1.4–3 М☉','Диаметр ~20 км','Ядерная плотность'],d:'Нейтронная звезда — сверхплотный остаток сверхновой. Масса 1.4–3 М☉ сжата до диаметра ~20 км. Плотность ядерная: чайная ложка весит сотни миллионов тонн. Состоит почти целиком из нейтронов. Может вращаться сотни раз в секунду, испуская направленные пучки — пульсар. Поверхностная гравитация в 200 миллиардов раз сильнее земной.'},
            'Пульсар':{e:'📡',g:'rgba(50,220,190,.45)',t:['Нейтронная звезда','Периодические импульсы','Миллисекунды–секунды'],d:'Пульсар — быстро вращающаяся нейтронная звезда с мощным магнитным полем, испускающая периодические радио- или рентгеновские импульсы. Первый пульсар открыт Джослин Белл в 1967 г. Миллисекундные пульсары вращаются до 716 оборотов в секунду — точнее атомных часов. Используются как «космические хронометры» для проверки ОТО.'},
            'Магнитар':{e:'🧲',g:'rgba(80,255,180,.45)',t:['Поле ~10¹⁵ Гс','Гамма-вспышки','~30 в Галактике'],d:'Магнитар — нейтронная звезда с магнитным полем ~10¹⁵ Гс, в 1000 раз сильнее обычных нейтронных звёзд. Периодически испускает мощные гамма-вспышки. Вспышка SGR 1806-20 в 2004 г. ионизировала ионосферу Земли с расстояния 50 000 световых лет. В Галактике известно около 30 магнитаров.'},
            'Рентгеновский пульсар':{e:'📻',g:'rgba(50,200,220,.45)',t:['Аккреция','Двойная система','Рентгеновское излучение'],d:'Рентгеновский пульсар — нейтронная звезда в двойной системе, аккрецирующая вещество от компаньона. Вещество направляется магнитным полем на полюса и разогревается до 10⁷–10⁸ К, излучая рентгеновские импульсы. Первый обнаружен в 1971 г. (Cen X-3). Некоторые раскручиваются до миллисекундных пульсаров.'},
            'Чёрная дыра (стелл.)':{e:'🕳️',g:'rgba(90,40,180,.5)',t:['Масса >3 М☉','Горизонт событий','Гравитационные волны'],d:'Чёрная дыра звёздной массы образуется при коллапсе ядра звезды >25 М☉, если масса остатка >3 М☉. Гравитация не позволяет покинуть область внутри горизонта событий даже свету. Первое прямое наблюдение — LIGO, 2015 (слияние двух ЧД). Обнаруживаются по аккреционным дискам, рентгеновскому излучению и гравитационным волнам.'},
            'Квазар':{e:'✨',g:'rgba(200,100,255,.5)',t:['АЯГ','Сверхмассивная ЧД','z > 0.1'],d:'Квазар — чрезвычайно яркое активное ядро далёкой галактики, питаемое аккрецией на сверхмассивную чёрную дыру (10⁶–10¹⁰ М☉). Светимость в 10¹³ раз выше солнечной. Один из ярчайших — 3C 273 на расстоянии 2.4 млрд световых лет. Квазары наблюдаются в ранней Вселенной и позволяют изучать её эволюцию.'},
            'Блазар':{e:'⚡',g:'rgba(180,80,255,.5)',t:['Квазар с джетом','Переменный','BL Lac / FSRQ'],d:'Блазар — активное ядро галактики, релятивистский джет которого направлен практически на наблюдателя. Это делает блазары исключительно яркими переменными источниками от радио до гамма-лучей. Делятся на BL Lac объекты и плоскоспектральные радиоквазары. Являются мощными источниками ультравысокоэнергетических космических лучей.'},
            'Звезда Вольфа–Райе':{e:'🌐',g:'rgba(100,180,255,.45)',t:['Без водорода','Мощный ветер','WR-звезда'],d:'Звёзды Вольфа–Райе лишились водородной оболочки из-за мощного звёздного ветра или обмена в двойной системе. Температура поверхности 25 000–100 000 К, масса 10–25 М☉. В спектре нет линий водорода — зато ярко выражены He, C, O. Предшественники сверхновых Ib/c и чёрных дыр. Один из ключевых источников тяжёлых элементов.'},
            'Гипергигант':{e:'🌠',g:'rgba(255,90,20,.55)',t:['Масса >100 М☉','Класс светимости 0','Редчайшие'],d:'Гипергиганты — самые массивные и яркие звёзды, класс светимости 0. Масса >100 М☉, светимость до миллиона солнечных. В Галактике известно лишь несколько десятков кандидатов. R136a1 в туманности Тарантул — рекордсмен (~215 М☉). Теряют колоссальное количество вещества через ветер. Живут 1–3 млн лет и взрываются гиперновыми.'},
            'Сверхновая (Тип Ib/c)':{e:'💥',g:'rgba(255,100,20,.6)',t:['Коллапс без оболочки','Звезда Вольфа–Райе','Гамма-вспышка'],d:'Сверхновые Ib (без водорода) и Ic (без водорода и гелия) — взрывы массивных звёзд, потерявших оболочки до взрыва. Характерны для звёзд Вольфа–Райе и тесных двойных. Некоторые Ic сопровождаются гамма-всплесками — самыми мощными взрывами во Вселенной (~10⁴⁴ Дж за секунды). В остатке — чёрная дыра звёздной массы.'},
            'Коричневый карлик':{e:'🟤',g:'rgba(140,70,30,.4)',t:['13–80 М♃','Дейтерий','Субзвёздный'],d:'Коричневый карлик — субзвёздный объект с массой 13–80 М♃, слишком лёгкий для устойчивого синтеза водорода. Может кратковременно сжигать дейтерий. Светит в инфракрасном диапазоне, постепенно остывая. Первый (Teide 1) открыт в 1995 г. В Галактике их примерно столько же, сколько обычных звёзд.'},
            'Субкарлик (VI)':{e:'🔹',g:'rgba(100,130,200,.4)',t:['Класс VI','Низкая металличность','Ниже ГП на ГР'],d:'Субкарлики (класс VI) — старые звёзды с низким содержанием тяжёлых элементов (металличностью), расположенные ниже главной последовательности на диаграмме ГР. Из-за сниженной непрозрачности их радиус меньше при той же температуре. Часто входят в состав галактического гало и шаровых скоплений.'},
            '0 — Гипергиганты':{e:'🌠',g:'rgba(255,90,20,.5)',t:['Класс светимости 0'],d:'Класс светимости 0 (гипергиганты) — наиболее яркие и массивные из всех звёзд. Их болометрическая светимость достигает 10⁶ L☉. Примеры: η Киля (~150 М☉), R136a1 (~215 М☉). Редчайший класс — в Галактике известно лишь несколько десятков представителей.'},
            'Ia — Яркие сверхгиганты':{e:'🔶',g:'rgba(220,70,30,.5)',t:['Класс Ia'],d:'Яркие сверхгиганты класса Ia — наиболее светимые представители сверхгигантов (класс I). Масса 10–70 М☉, светимость 10⁴–10⁶ L☉. Мощный звёздный ветер уносит значительную долю массы. Примеры: Денеб (α Лебедя), ρ Кассиопеи.'},
            'Ib — Слабые сверхгиганты':{e:'🔸',g:'rgba(200,90,40,.5)',t:['Класс Ib'],d:'Слабые сверхгиганты класса Ib менее яркие, чем Ia, но всё равно во много раз ярче Солнца. Как и Ia, они находятся в конце своей жизни и вскоре взорвутся сверхновой. Имеют меньшую скорость звёздного ветра, чем гипергиганты класса 0.'},
            'II — Яркие гиганты':{e:'🟡',g:'rgba(230,190,60,.4)',t:['Класс II'],d:'Яркие гиганты класса II занимают промежуточное положение между нормальными гигантами (III) и сверхгигантами (I). Они крупнее и ярче гигантов, но не достигают светимости сверхгигантов. Примеры: β Лебедя (Альбирео B).'},
            'III — Гиганты':{e:'🟠',g:'rgba(220,150,50,.4)',t:['Класс III','После ГП'],d:'Гиганты класса III — звёзды, покинувшие главную последовательность и расширившиеся. Радиус в 10–100 раз превышает солнечный. Arcturus (α Волопаса) — ярчайший красный гигант северного неба. Aldebaran (α Тельца) — оранжевый гигант в 44 раза крупнее Солнца.'},
            'IV — Субгиганты':{e:'🟢',g:'rgba(180,220,80,.4)',t:['Класс IV','Переходный'],d:'Субгиганты класса IV чуть крупнее и ярче звёзд главной последовательности того же спектрального типа. Это звёзды, начинающие уходить с ГП — ядро почти исчерпало водород. Примеры: Procyon A (F5 IV), β Водолея.'},
            'V — Главная последовательность':{e:'⭐',g:'rgba(100,180,255,.4)',t:['Класс V','Основная стадия','Синтез H'],d:'Класс светимости V — звёзды главной последовательности. Это наиболее распространённый класс; около 90% всех звёзд в данный момент находятся на ГП. Солнце — G2V. Чем массивнее звезда, тем ярче и короче её жизнь на главной последовательности.'},
            'VI — Субкарлики':{e:'🔹',g:'rgba(100,130,200,.4)',t:['Класс VI','Металличность < -1','Гало'],d:'Субкарлики класса VI расположены ниже главной последовательности на ДГР. Низкое содержание тяжёлых элементов уменьшает непрозрачность, из-за чего при той же температуре они имеют меньший радиус. Как правило, это очень старые звёзды галактического гало или шаровых скоплений.'},
            'VII — Белые карлики':{e:'💠',g:'rgba(150,170,255,.5)',t:['Класс VII','Конечный этап','Предел 1.4 М☉'],d:'Белые карлики класса VII — конечный этап звёзд малой и средней массы. Размером с Землю, но масса ~0.6 М☉. Без термоядерных реакций. Около 97% всех звёзд закончат жизнь белыми карликами. Наиболее известный — Сириус B (ближайший белый карлик, 8.6 световых лет).'},
            'O (> 30 000 К)':{e:'🔵',g:'rgba(60,120,255,.5)',t:['Горячие','Редкие','Ионизация'],d:'O-звёзды — горячейшие (~30 000–100 000 К) и редчайшие: их менее 0.00003% от всех звёзд. Абсолютная величина до -6. Примеры: звёзды скопления R136. Ионизируют окружающий газ, создавая крупные туманности HII. Все O-звёзды закончат жизнь сверхновыми.'},
            'B (10–30 тыс. К)':{e:'💙',g:'rgba(80,160,255,.45)',t:['Сине-белые','Ригель, Спика'],d:'B-звёзды — горячие сине-белые звёзды. Составляют ~0.13% всех звёзд. Масса 2–16 М☉. Примеры: Ригель (B8Ia), Спика (B1V). Многие являются двойными. Выброс сильного УФ-излучения ионизирует окружающий газ.'},
            'A (7.5–10 тыс. К)':{e:'🌟',g:'rgba(200,200,255,.4)',t:['Белые','Сириус, Вега'],d:'A-звёзды — белые звёзды. Составляют ~0.6% всех звёзд. Масса 1.4–2.1 М☉. Сириус A (A1V) — ярчайшая звезда ночного неба. Вега — стандарт нулевой звёздной величины. Некоторые A-звёзды имеют аномальный химический состав (Ap-звёзды).'},
            'F (6–7.5 тыс. К)':{e:'🌕',g:'rgba(240,220,150,.4)',t:['Желто-белые','Процион, Полярная'],d:'F-звёзды — желто-белые. Составляют ~3% всех звёзд. Масса 1.04–1.4 М☉. Процион A (F5IV-V) — один из ярчайших на ночном небе. Многие цефеиды — F-сверхгиганты. В их атмосферах появляются линии металлов.'},
            'G (5.2–6 тыс. К)':{e:'☀️',g:'rgba(255,220,80,.4)',t:['Жёлтые','Солнце G2V','7.5% звёзд'],d:'G-звёзды — жёлтые. Составляют ~7.5% звёзд. Масса 0.8–1.04 М☉. Солнце — G2V, температура 5778 К. α Центавра A — G2V, почти близнец Солнца. G-звёзды интересны как потенциальные хозяева обитаемых планет.'},
            'K (3.7–5.2 тыс. К)':{e:'🟠',g:'rgba(230,140,60,.4)',t:['Оранжевые','Арктур','12% звёзд'],d:'K-звёзды — оранжевые. Составляют ~12% звёзд. Масса 0.45–0.8 М☉. Долго живут на ГП. Арктур (K1.5III) — ближайший красный гигант. ε Эридана (K2V) — ближайшая одиночная K-звезда, изучаемая в контексте поиска экзопланет.'},
            'M (2.4–3.7 тыс. К)':{e:'🔴',g:'rgba(220,60,40,.4)',t:['Красные карлики','70% звёзд','Долгожители'],d:'M-звёзды — красные карлики, самые распространённые в Галактике (~70%). Масса 0.08–0.5 М☉, слабая светимость. Проксима Центавра (M5.5Ve) — ближайшая звезда к Солнцу. Вокруг многих открыты экзопланеты, в т.ч. в зоне обитаемости.'},
            'L (1.3–2.1 тыс. К)':{e:'🟫',g:'rgba(140,60,30,.4)',t:['Тёмно-красные','Пыль в атмосфере','Граница звезда/карлик'],d:'L-звёзды — ультрахолодные объекты на границе между красными карликами и коричневыми карликами. В их атмосферах конденсируются пылевые облака из силикатов и железа. Открыты лишь в конце 1990-х гг. с появлением инфракрасных обзоров 2MASS и SDSS.'},
            'T (600–1300 К)':{e:'🟤',g:'rgba(120,50,20,.4)',t:['Коричневые карлики','Метановые','< 1300 К'],d:'T-класс — коричневые карлики с температурой ниже 1300 К. Характерная черта — полосы метана в спектре (не встречающиеся у более горячих звёзд). Объекты крайне тусклые, видны только в инфракрасном диапазоне. Первый чистый T-карлик — Gliese 229B, открытый в 1995 г.'},
            'Y (< 600 К)':{e:'🔵',g:'rgba(80,100,200,.35)',t:['Ультрахолодные','< 600 К','WISE'],d:'Y-класс — холоднейшие из известных субзвёздных объектов. Температура поверхности ниже 600 К — сравнима с температурой духовки. Открыты в 2011 г. по данным телескопа WISE. В их атмосферах возможны водяные облака. Самый холодный известный кандидат — WISE 0855-0714 (~250 К).'},
            };

            {id:'spT',  label:'T (600–1300 К)',             x:C[1]+45, y:R.r7+620, w:230, cls:'nd c-ora'},

            {id:'hFin', label:'КОНЕЧНЫЕ СОСТОЯНИЯ',        x:C[3]+45, y:R.r7,    w:260, cls:'nd hdr', noModal:true},
            {id:'fWD',  label:'Белый карлик\n(< 8 М☉)',    x:C[3]+45, y:R.r7+60,  w:230, cls:'nd c-wht'},
            {id:'fNS',  label:'Нейтронная звезда\n(8–25 М☉)',x:C[3]+45,y:R.r7+130,w:230, cls:'nd c-tel'},
            {id:'fBH',  label:'Чёрная дыра\n(> 25 М☉)',   x:C[3]+45, y:R.r7+200, w:230, cls:'nd c-pur'},
            {id:'fBD',  label:'Коричневый карлик\n(не звезда)',x:C[3]+45,y:R.r7+270,w:230,cls:'nd c-ora'},

            ];

            // ── ARROWS ──────────────────────────────────────────────────────
            // Format: [fromId, toId, color, dashed]
            const ARROWS = [
            // Cloud → Proto → branches
            ['neb',  'proto','#7a6a50'],
            ['proto','cl_M', '#c06060'],
            ['proto','cl_G', '#c0a040'],
            ['proto','cl_BO','#4080c0'],
            ['proto','cl_O', '#c07030'],
            ['proto','bd',   '#906040'],

            // Branch 1: Low mass
            ['cl_M', 'ms_M', '#c05050'],
            ['ms_M', 'rkd',  '#c05050'],
            ['rkd',  'wd_m', '#9090c0'],

            // Branch 2: Medium mass
            ['cl_G', 'ms_G', '#c0a040'],
            ['ms_G', 'subg', '#d09030'],
            ['subg', 'rg',   '#e06030'],
            ['rg',   'hz',   '#c09030',true],
            ['rg',   'agb',  '#e07020'],
            ['hz',   'agb',  '#c09030',true],
            ['agb',  'pn',   '#50c070'],
            ['pn',   'wd',   '#8090c0'],
            ['wd',   'bkd',  '#606080'],
            ['wd',   'nova', '#c0a030',true],
            ['nova', 'sn_ia','#e07020'],

            // Branch 3: High mass
            ['cl_BO','ms_BO','#4080c0'],

            ['bsg',  'ysg',  '#c0a030'],
            ['bsg',  'rsg',  '#e05020',true],
            ['ysg',  'rsg',  '#e05020'],
            ['rsg',  'sn2',  '#e07010'],

            ['ns',   'magnet','#40c080'],

            // ── BUILD DOM ───────────────────────────────────────────────────
            const vp  = document.getElementById('viewport');
            const svg = document.getElementById('arrowSvg');
            const nmap = {};

            NODES.forEach(n => {
            const div = document.createElement('div');
            div.className = n.cls;
            div.style.cssText = `left:${n.x}px;top:${n.y}px;width:${n.w}px;position:absolute;`;
            div.innerHTML = n.label.replace(/\n/g,'<br>');
            if(!n.noModal){
                div.addEventListener('click', e => {
                e.stopPropagation();
                const key = n.label.replace(/\n/g,' ').trim();
                const info = DB[key] || Object.values(DB).find((_,i)=>{
                    const k=Object.keys(DB)[i];
                    return key.toLowerCase().includes(k.toLowerCase().slice(0,7)) || k.toLowerCase().includes(key.toLowerCase().slice(0,7));
                });
                if(info) openModal(key, info);
                });
            }
            vp.appendChild(div);
            nmap[n.id] = {el:div, x:n.x, y:n.y, w:n.w};
            });

            // ── DRAW ARROWS ─────────────────────────────────────────────────
            const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
            svg.appendChild(defs);

            function drawArrows(){
            svg.querySelectorAll('path').forEach(p=>p.remove());
            defs.innerHTML='';
            ARROWS.forEach(([fid,tid,color,dashed])=>{
                const a=nmap[fid], b=nmap[tid];
                if(!a||!b) return;
                const ah=a.el.offsetHeight||H, bh=b.el.offsetHeight||H;
                const ax=a.x+a.w, ay=a.y+ah/2;
                const bx=b.x,     by=b.y+bh/2;

                const mkid=`mk_${fid}_${tid}`;
                const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
                mk.setAttribute('id',mkid);mk.setAttribute('markerWidth','7');
                mk.setAttribute('markerHeight','7');mk.setAttribute('refX','6');
                mk.setAttribute('refY','3.5');mk.setAttribute('orient','auto');
                const mkp=document.createElementNS('http://www.w3.org/2000/svg','path');
                mkp.setAttribute('d','M0,0 L0,7 L7,3.5 z');
                mkp.setAttribute('fill',color);mkp.setAttribute('opacity','.75');
                mk.appendChild(mkp);defs.appendChild(mk);

                const p=document.createElementNS('http://www.w3.org/2000/svg','path');
                let d;
                if(Math.abs(ay-by)<4){
                // perfectly horizontal — straight line
                d=`M${ax},${ay} L${bx},${by}`;
                } else {
                // right-angle elbow: go right to midpoint X, then vertical, then right to dest
                const mx=(ax+bx)/2;
                d=`M${ax},${ay} L${mx},${ay} L${mx},${by} L${bx},${by}`;
                }
                p.setAttribute('d',d);p.setAttribute('fill','none');
                p.setAttribute('stroke',color);p.setAttribute('stroke-width','1.7');
                p.setAttribute('opacity','.6');p.setAttribute('marker-end',`url(#${mkid})`);
                if(dashed) p.setAttribute('stroke-dasharray','6,4');
                svg.appendChild(p);
            });
            }
            setTimeout(drawArrows, 120);

            // ── PAN ─────────────────────────────────────────────────────────
            let tx=0, ty=0, dr=false, ox2, oy2;
            function applyT(){vp.style.transform=`translate(${tx}px,${ty}px)`;}
            applyT();

            document.addEventListener('mousedown',e=>{
            if(e.target.closest('#mOv')||e.target.closest('#backBtn')) return;
            dr=true;ox2=e.clientX-tx;oy2=e.clientY-ty;document.body.classList.add('drag');
            });
            document.addEventListener('mousemove',e=>{
            if(!dr)return;
            tx=e.clientX-ox2;ty=e.clientY-oy2;
            tx=Math.min(80,Math.max(-(5200-innerWidth+80),tx));
            ty=Math.min(80,Math.max(-(3000-innerHeight+80),ty));
            applyT();
            });
            document.addEventListener('mouseup',()=>{dr=false;document.body.classList.remove('drag');});
            let tox2,toy2;
            document.addEventListener('touchstart',e=>{tox2=e.touches[0].clientX-tx;toy2=e.touches[0].clientY-ty;},{passive:true});
            document.addEventListener('touchmove',e=>{
            tx=e.touches[0].clientX-tox2;ty=e.touches[0].clientY-toy2;
            tx=Math.min(80,Math.max(-(5200-innerWidth+80),tx));
            ty=Math.min(80,Math.max(-(3000-innerHeight+80),ty));
            applyT();
            },{passive:true});

            // ── MODAL ────────────────────────────────────────────────────────
            function openModal(title, info){
            document.getElementById('mTitle').textContent=title;
            document.getElementById('mDesc').textContent=info.d;
            document.getElementById('mEmoji').textContent=info.e;
            document.getElementById('mIcon').style.setProperty('--mgl',info.g);
            document.getElementById('mTitle').style.textShadow=`0 0 40px ${info.g}`;
            const t=document.getElementById('mTags');t.innerHTML='';
            (info.t||[]).forEach(s=>{const sp=document.createElement('span');sp.className='tag';sp.textContent=s;t.appendChild(sp);});
            document.getElementById('mOv').classList.add('on');
            }
            document.getElementById('mClose').onclick=()=>document.getElementById('mOv').classList.remove('on');
            document.getElementById('mOv').addEventListener('click',e=>{if(e.target===document.getElementById('mOv'))document.getElementById('mOv').classList.remove('on');});
            document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('mOv').classList.remove('on');});
        </script>
