<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>
            Классификация звёзд
        </title>
        
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(38, 0, 77, 1) 48%, rgba(50, 0, 143, 1) 98%);
                font-family: 'Raleway',sans-serif;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                cursor: grab;
                user-select: none;
            }

            body.drag {
                cursor:grabbing;
            }

            canvas#bg {
                position:fixed;inset:0;z-index:0;pointer-events:none;
            }

            #viewport {
                position:absolute;
                /* canvas space: roughly x: -440 to 5100, y: -2560 to 1500 — we shift by +600,+2700 */
                width:6200px;height:4800px;
                top:0;left:0;z-index:1;transform-origin:0 0;
            }

            #arrowSvg {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 1;
                overflow: visible;
            }

            /* Nebula canvas — lives inside #viewport, behind all nodes */
            #nebulaCvs {
                position: absolute;
                top: 0;
                left: 0;
                pointer-events: none;
                z-index: 0;
            }

            /* ── NODE BASE ── */
            .nd {
                position:absolute;border-radius:8px;padding:7px 14px;
                font-size:12.5px;font-weight:500;text-align:center;line-height:1.4;
                cursor:pointer;z-index:2;border:1px solid transparent;
                transition:transform .18s ease,box-shadow .18s ease;
                display:flex;align-items:center;justify-content:center;
            }

            .nd:hover {
                transform:translateY(-4px) scale(1.04);
                box-shadow:0 14px 36px rgba(0,0,0,.75),0 0 22px var(--gl,rgba(255,255,255,.15));
                z-index:20!important;
            }

            /* colour classes — matching canvas colours */
            .c1 {
                background: linear-gradient(135deg,#2a0d0d,#3d1515);
                border-color:#802020;
                color:#f07070;
                --gl:rgba(255,80,80,.35);
            }   /* red */
            
            .c2 {
                background:linear-gradient(135deg,#1e1505,#2d2008);
                border-color:#7a5510;
                color:#e8a840;
                --gl:rgba(255,170,50,.3);
            }    /* orange */
            
            .c3 {
                background:linear-gradient(135deg,#181a05,#252808);
                border-color:#707010;
                color:#d8d050
                ;--gl:rgba(230,220,50,.25);
            }   /* yellow */
            
            .c4 {
                background:linear-gradient(135deg,#0a1a10,#102018);
                border-color:#285030;
                color:#60c070;
                --gl:rgba(80,200,100,.25);
            }   /* green */
            
            .c5 {
                background:linear-gradient(135deg,#0a1828,#102035);
                border-color:#204870;
                color:#60a8e8;
                --gl:rgba(80,160,255,.3);
            }    /* blue */
            
            .c6 {
                background:linear-gradient(135deg,#14181a,#1c2428);
                border-color:#306070;
                color:#70c8d8;
                --gl:rgba(70,200,220,.3);
                font-size: 18px;
            }  
            
            .cpurple {
                background: linear-gradient(135deg,#14082a,#200f3d);
                border-color:#503080;
                color:#a870e8;
                --gl:rgba(150,80,255,.35);
                font-size: 14px;
            }
            
            .cblue2 {
                background: linear-gradient(135deg,#080c28,#0f1438);
                border-color:#303880;
                color:#7080d8;
                --gl:rgba(90,110,220,.3);
            }
            
            .cbrown {
                background: linear-gradient(135deg,#1a1008,#28180a);
                border-color: #604020;
                color: c07840;
                --gl: rgba(190,110,50,.3);
            }
            
            .cgray {
                background: rgba(255,255,255,.04);
                border-color: rgba(255,255,255,.12);
                color: rgba(180,180,200,.7);
                --gl: rgba(200,200,220,.2);
                font-size: 14.5px;
            }
            
            .cwine {
                background: linear-gradient(135deg,#1a0a14,#280f1e);
                border-color:#602040;
                color:#c06080;
                --gl:rgba(200,80,120,.3);}
            
            .cdark {background: linear-gradient(135deg,#0e0e18,#141420);
                border-color:#383860;
                color:#8888c0;
                --gl:rgba(120,120,200,.2);
            }

            /* group frame */
            .grp {
                position: absolute;
                border-radius:12px;
                border:1px solid rgba(255,255,255,.08);
                background:rgba(255,255,255,.02);
                z-index:0;
                pointer-events:none;
            }
            .grp-label{
                position: absolute;
                font-family: 'Cinzel',serif;
                font-size: 15px;
                letter-spacing: .1em;
                color:rgba(255,255,255,.25);
                padding:4px 10px;
                top:-30px;
                left:8px;
                white-space:nowrap;
                pointer-events:none;
            }

            /* UI */
            #backBtn {
                position:fixed;
                top:22px;
                left:22px;
                z-index:1000;
                display:flex;
                align-items:center;
                gap:7px;
                padding:9px 18px;
                background:rgba(255,255,255,.07);
                border:1px solid rgba(255,255,255,.14);
                border-radius:30px;color:#bbb;font-family:'Raleway',sans-serif;font-size:12px;font-weight:500;letter-spacing:.05em;cursor:pointer;backdrop-filter:blur(10px);text-decoration:none;transition:all .2s;}
            
            #backBtn:hover {
                background:rgba(255,255,255,.13);
                color:#fff;
                transform:translateX(-2px);
            }
            
            #backBtn svg {
                width:15px;
                height:15px;
            }

            /* Кнопка «Терминология» — зеркало backBtn, справа */
            #termBtn {
                position: fixed;
                top: 22px;
                right: 22px;
                z-index: 1000;
                display: flex;
                align-items: center;
                gap: 7px;
                padding: 9px 18px;
                background: rgba(255,255,255,.07);
                border: 1px solid rgba(255,255,255,.14);
                border-radius: 30px;
                color: #bbb;
                font-family: 'Raleway', sans-serif;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: .05em;
                cursor: pointer;
                backdrop-filter: blur(10px);
                text-decoration: none;
                transition: all .2s;
                user-select: none;
            }

            #termBtn:hover {
                background: rgba(255,255,255,.13);
                color: #fff;
                transform: translateX(2px);
            }

            #termBtn svg {
                width: 15px;
                height: 15px;
            }
            
            #pgTitle {
                position:fixed;
                top:24px;
                left:50%;
                transform:translateX(-50%);
                z-index:100;
                font-family:'Cinzel',serif;
                font-size:12px;
                font-weight:600;
                letter-spacing:.22em;
                color:rgba(255,255,255,.28);
                pointer-events:none;
                text-transform:uppercase;
                white-space:nowrap;}
            
            #hint {
                position:fixed;
                bottom:18px;
                left:50%;
                transform:translateX(-50%);
                z-index:100;
                font-size:10px;
                color:rgba(255,255,255,.15);
                letter-spacing:.1em;
                pointer-events:none;
            }

            /* MODAL */
            #mOv {
                display:none;
                position:fixed;
                inset:0;z-index:2000;
                background:rgba(5,7,18,.9);
                backdrop-filter:blur(18px);
            }

            #mOv.on {
                display:flex;
                align-items:center;
                justify-content:center;
                animation:fIn .22s ease;
            }

            @keyframes fIn{from{opacity:0}to{opacity:1}}

            #mBox {
                position:relative;
                width:calc(100vw - 100px);
                height:calc(100vh - 100px);
                background:linear-gradient(145deg,#0e1020,#141828,#0e1020);
                border:1px solid rgba(255,255,255,.1);
                border-radius:18px;
                overflow:hidden;
                animation:sUp .28s cubic-bezier(.34,1.56,.64,1);
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                padding:60px 80px;
                gap:26px;
            }

            @keyframes sUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}

            #mBox::before,#mBox::after {
                content:'';
                position:absolute;
                width:55px;
                height:55px;
                border-color:rgba(255,255,255,.06);
                border-style:solid;
            }

            #mBox::before {
                top:14px;
                left:14px;
                border-width:1px 0 0 1px;
                border-radius:3px 0 0 0;
            }

            #mBox::after {
                bottom:14px;
                right:14px;
                border-width:0 1px 1px 0;
                border-radius:0 0 3px 0;
            }

            #mClose {
                position:absolute;
                top:18px;
                right:18px;
                width:36px;height:36px;
                border-radius:50%;
                background:rgba(255,255,255,.06);
                border:1px solid rgba(255,255,255,.12);
                color:rgba(255,255,255,.55);
                font-size:17px;
                cursor:pointer;
                display:flex;
                align-items:center;
                justify-content:center;
                transition:all .2s;
            }

            #mClose:hover {
                background:rgba(255,255,255,.14);
                color:#fff;
                transform:scale(1.1);
            }

            #mIcon {
                width:160px;height:160px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
            #mIcon::before {
                content:'';position:absolute;inset:-16px;border-radius:50%;background:radial-gradient(circle,var(--mgl,rgba(150,100,255,.2)) 0%,transparent 70%);animation:pulse 3s ease-in-out infinite;}
            @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
            #mTitle {
                font-family:'Cinzel',serif;font-size:clamp(18px,2.5vw,30px);font-weight:700;color:#fff;text-align:center;letter-spacing:.05em;}
            #mDesc {
                font-size:14px;line-height:1.9;color:rgba(200,195,220,.82);max-width:660px;text-align:center;font-weight:300;}
            #mTags {
                display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
            .tag {
                padding:4px 12px;border-radius:20px;font-size:10px;letter-spacing:.08em;font-weight:600;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.42);}

            /* ── TERMINOLOGY OVERLAY ── */
            #termOv {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 2000;
                background: rgba(5,7,18,.9);
                backdrop-filter: blur(18px);
            }

            #termOv.on {
                display: flex;
                align-items: center;
                justify-content: center;
                animation: fIn .22s ease;
            }

            #termBox {
                position: relative;
                width: calc(100vw - 100px);
                height: calc(100vh - 100px);
                background: linear-gradient(145deg,#0e1020,#141828,#0e1020);
                border: 1px solid rgba(255,255,255,.1);
                border-radius: 18px;
                overflow: hidden;
                animation: sUp .28s cubic-bezier(.34,1.56,.64,1);
                display: flex;
                flex-direction: column;
                padding: 56px 60px 40px;
                gap: 0;
            }

            #termBox::before,#termBox::after {
                content: '';
                position: absolute;
                width: 55px;
                height: 55px;
                border-color: rgba(255,255,255,.06);
                border-style: solid;
                pointer-events: none;
            }

            #termBox::before {
                top: 14px;
                left: 14px;
                border-width: 1px 0 0 1px;
                border-radius: 3px 0 0 0;
            }

            #termBox::after {
                bottom: 14px;
                right: 14px;
                border-width: 0 1px 1px 0;
                border-radius: 0 0 3px 0;
            }

            #termClose {
                position: absolute;
                top: 18px;
                right: 18px;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(255,255,255,.06);
                border: 1px solid rgba(255,255,255,.12);
                color: rgba(255,255,255,.55);
                font-size: 17px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all .2s;
            }

            #termClose:hover {
                background: rgba(255,255,255,.14);
                color: #fff;
                transform: scale(1.1);
            }

            #termHeading {
                font-family: 'Cinzel', serif;
                font-size: clamp(20px, 2.2vw, 30px);
                font-weight: 700;
                color: #fff;
                letter-spacing: .08em;
                text-align: center;
                margin-bottom: 32px;
                flex-shrink: 0;
                text-shadow: 0 0 50px rgba(160,120,255,.5);
            }

            #termSearch {
                flex-shrink: 0;
                margin-bottom: 22px;
                padding: 10px 18px;
                background: rgba(255,255,255,.05);
                border: 1px solid rgba(255,255,255,.12);
                border-radius: 30px;
                color: rgba(255,255,255,.75);
                font-family: 'Raleway', sans-serif;
                font-size: 13px;
                outline: none;
                width: 100%;
                max-width: 520px;
                align-self: center;
                transition: border-color .2s, background .2s;
            }

            #termSearch::placeholder {
                color: rgba(255,255,255,.25);
            }

            #termSearch:focus {
                background: rgba(255,255,255,.08);
                border-color: rgba(160,130,255,.45);
            }

            #termList {
                flex: 1;
                overflow-y: auto;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 14px;
                align-content: start;
                padding-right: 8px;
            }

            #termList::-webkit-scrollbar {
                width: 5px;
            }

            #termList::-webkit-scrollbar-track {
                background: transparent;
            }

            #termList::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.12);
                border-radius: 4px;
            }

            .term-card {
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.08);
                border-radius: 12px;
                padding: 16px 20px;
                display: flex;
                flex-direction: column;
                gap: 7px;
                transition: background .18s, border-color .18s;
            }

            .term-card:hover {
                background: rgba(255,255,255,.07);
                border-color: rgba(255,255,255,.15);
            }

            .term-card-head {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .term-emoji {
                font-size: 22px;
                flex-shrink: 0;
                line-height: 1;
            }

            .term-name {
                font-family: 'Cinzel', serif;
                font-size: 13px;
                font-weight: 600;
                color: #e8e0ff;
                letter-spacing: .04em;
            }

            .term-desc {
                font-size: 12px;
                line-height: 1.75;
                color: rgba(190,185,215,.7);
                font-weight: 300;
            }

            .term-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                margin-top: 2px;
            }

            .term-tag {
                padding: 2px 9px;
                border-radius: 20px;
                font-size: 9px;
                letter-spacing: .07em;
                font-weight: 600;
                text-transform: uppercase;
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.09);
                color: rgba(255,255,255,.35);
            }
        </style>
    </head>
    <body>
        <canvas id="bg"></canvas>

        <a href="/" id="backBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Назад
        </a>

        <button id="termBtn">
            Терминология
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </button>

        <!-- Terminology overlay -->
        <div id="termOv">
            <div id="termBox">
                <button id="termClose">✕</button>
                <div id="termHeading">
                    Терминология
                </div>
                <input id="termSearch" type="text" placeholder="Поиск по терминам…" autocomplete="off">
                <div id="termList"></div>
            </div>
        </div>

        <div id="pgTitle">
            Классификация звёзд
        </div>

        <div id="hint">
            Перетащите для навигации · Нажмите на блок для подробностей
        </div>

        <div id="viewport">
            <canvas id="nebulaCvs"></canvas>
            <svg id="arrowSvg"></svg>
        </div>

        <div id="mOv">
            <div id="mBox">
                <button id="mClose">✕</button>
                <div id="mIcon">
                    <span id="mEmoji"></span>
                </div>
                <div id="mTitle"></div>
                <div id="mDesc"></div>
                <div id="mTags"></div>
            </div>
        </div>

        <script>
            // ── OFFSET: shift canvas coords → screen coords ──────────────────
            // Canvas min x ≈ -440, min y ≈ -2560 → add (OX,OY) to bring into viewport
            const OX = 500, OY = 2700;

            function cx(x) { 
                return x + OX; 
            }
            function cy(y) { 
                return y + OY; 
            }

            // ── STARFIELD + SHOOTING STARS ───────────────────────────────────
            const bc = document.getElementById('bg');
            const bx = bc.getContext('2d');

            function rsz() {
                bc.width  = innerWidth;
                bc.height = innerHeight;
            }
            rsz();
            window.addEventListener('resize', rsz);

            // Static twinkling stars
            const ST = Array.from({ length: 220 }, () => ({
                x:  Math.random() * 3000,
                y:  Math.random() * 2000,
                r:  Math.random() * 1.2,
                a:  Math.random(),
                sp: Math.random() * 0.003 + 0.001,
            }));

            // Shooting-stars pool
            const shootStars = [];

            function spawnShootingStar() {
                // Start from a random point along the top or left edge
                const fromTop = Math.random() < 0.65;
                const sx = fromTop ? Math.random() * bc.width : 0;
                const sy = fromTop ? 0 : Math.random() * bc.height * 0.5;

                // Angle roughly 35–55° diagonal (top-left → bottom-right feel)
                const angle = (Math.PI / 4) + (Math.random() - 0.5) * 0.35;
                const speed = 7 + Math.random() * 9;

                shootStars.push({
                    x:     sx,
                    y:     sy,
                    vx:    Math.cos(angle) * speed,
                    vy:    Math.sin(angle) * speed,
                    len:   90 + Math.random() * 160,
                    life:  1.0,
                    decay: 0.011 + Math.random() * 0.016,
                });
            }

            // Spawn intervals: every 2.5 – 5.5 s, max 4 at once
            let shootCooldown = 2500 + Math.random() * 3000;
            let shootElapsed  = 0;
            let prevTime      = performance.now();

            (function loop(now) {
                const dt = now - prevTime;
                prevTime = now;

                bx.clearRect(0, 0, bc.width, bc.height);

                // ── Twinkling stars
                ST.forEach(s => {
                    s.a += s.sp;
                    bx.beginPath();
                    bx.arc(s.x % bc.width, s.y % bc.height, s.r, 0, Math.PI * 2);
                    bx.fillStyle = `rgba(200,210,255,${0.1 + 0.38 * Math.abs(Math.sin(s.a))})`;
                    bx.fill();
                });

                // ── Spawn timer
                shootElapsed += dt;
                if (shootElapsed >= shootCooldown && shootStars.length < 4) {
                    spawnShootingStar();
                    shootElapsed  = 0;
                    shootCooldown = 2500 + Math.random() * 3000;
                }

                // ── Draw & update each shooting star
                for (let i = shootStars.length - 1; i >= 0; i--) {
                    const s = shootStars[i];
                    s.x    += s.vx;
                    s.y    += s.vy;
                    s.life -= s.decay;

                    // Remove when faded or off-screen
                    if (s.life <= 0 || s.x > bc.width + 100 || s.y > bc.height + 100) {
                        shootStars.splice(i, 1);
                        continue;
                    }

                    const ang   = Math.atan2(s.vy, s.vx);
                    const tailX = s.x - Math.cos(ang) * s.len;
                    const tailY = s.y - Math.sin(ang) * s.len;

                    // Gradient tail: transparent → bright head
                    const tailGrad = bx.createLinearGradient(tailX, tailY, s.x, s.y);
                    tailGrad.addColorStop(0,   `rgba(255,255,255,0)`);
                    tailGrad.addColorStop(0.7, `rgba(220,230,255,${s.life * 0.55})`);
                    tailGrad.addColorStop(1,   `rgba(255,255,255,${s.life * 0.95})`);
                    bx.beginPath();
                    bx.moveTo(tailX, tailY);
                    bx.lineTo(s.x, s.y);
                    bx.strokeStyle = tailGrad;
                    bx.lineWidth   = 1.4;
                    bx.stroke();

                    // Glowing head dot
                    const headGrad = bx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 4);
                    headGrad.addColorStop(0,   `rgba(255,255,255,${s.life})`);
                    headGrad.addColorStop(0.5, `rgba(190,210,255,${s.life * 0.6})`);
                    headGrad.addColorStop(1,   `rgba(0,0,0,0)`);
                    bx.beginPath();
                    bx.arc(s.x, s.y, 4, 0, Math.PI * 2);
                    bx.fillStyle = headGrad;
                    bx.fill();
                }

                requestAnimationFrame(loop);
            })(performance.now());

            // ── INFO DB ──────────────────────────────────────────────────────
            const DB = {
            'Газопылевое облако':{e:'🌫️',g:'rgba(120,100,70,.4)',t:['Молекулярное облако','Гравитация','Начало жизни'],d:'Газопылевые облака — плотные скопления газа (водород, гелий) и межзвёздной пыли. Под действием гравитации или внешнего толчка (например, ударной волны от сверхновой) облако сжимается и фрагментируется, давая начало протозвёздным ядрам. Эта стадия может длиться от 100 000 лет для массивных звёзд до миллиарда лет для наименее массивных.'},
            'Протозвезда':{e:'🟤',g:'rgba(180,110,50,.45)',t:['Контракция','Диск аккреции','Нет ядерных реакций'],d:'Протозвезда образуется при гравитационном коллапсе фрагмента молекулярного облака. Ядро разогревается за счёт сжатия (процесс Кельвина–Гельмгольца), но термоядерные реакции ещё не идут. Окружена вращающимся диском аккреции. Когда температура ядра достигает ~10 млн К, запускается синтез водорода — звезда выходит на главную последовательность.'},
            'Звёзды класс K, J, F, A':{e:'🌕',g:'rgba(230,180,80,.4)',t:['Главная последовательность','0.5–8 М☉','Миллиарды лет'],d:'Звёзды спектральных классов K (оранжевые), F (желто-белые) и A (белые) — звёзды средней массы на главной последовательности. Класс K: 3700–5200 К, масса 0.5–0.8 М☉. Класс F: 6000–7500 К, масса 1–1.4 М☉. Класс A: 7500–10000 К, масса 1.4–2 М☉. Сжигают водород в гелий, стабильны миллиарды лет.'},
            'Звёзды класс G':{e:'☀️',g:'rgba(255,220,80,.4)',t:['Жёлтые карлики','Солнце G2V','5200–6000 К'],d:'Звёзды класса G — жёлтые карлики с температурой поверхности 5200–6000 К и массой 0.8–1.04 М☉. Составляют около 7.5% всех звёзд. Наше Солнце — G2V. α Центавра A — почти полный близнец Солнца. Продолжительность жизни на главной последовательности — около 10 млрд лет.'},
            'Звёзды класс M':{e:'🔴',g:'rgba(220,60,40,.4)',t:['Красные карлики','0.08–0.5 М☉','Долгожители'],d:'Звёзды класса M — красные карлики, самые распространённые в Галактике (~70% всех звёзд). Температура 2400–3700 К, масса 0.08–0.5 М☉. Полностью конвективны — сжигают водород медленно и равномерно. Живут триллионы лет. Проксима Центавра (M5.5) — ближайшая звезда к Солнцу.'},
            'Звёзды класс B, O':{e:'💙',g:'rgba(70,140,255,.5)',t:['8–120 М☉','Горячие','Короткоживущие'],d:'Звёзды классов B и O — самые горячие и массивные на главной последовательности. Класс B: 10 000–30 000 К, масса 2–16 М☉. Класс O: >30 000 К, масса 16–120 М☉. Светимость в тысячи–сотни тысяч раз выше солнечной. Живут 1–10 миллионов лет. Ионизируют межзвёздный газ, образуя туманности HII.'},
            'Звёзды класс L, T, Y':{e:'🟤',g:'rgba(130,60,20,.4)',t:['Субзвёздные','M☉ < 0.075','Коричневые карлики'],d:'Классы L, T, Y — ультрахолодные субзвёздные объекты (коричневые карлики) на границе между звёздами и планетами. Класс L: 1300–2200 К, пылевые облака в атмосфере. Класс T: 600–1300 К, метановые полосы. Класс Y: <600 К — холоднее некоторых планет. Слишком малы для устойчивого синтеза водорода.'},
            'Звёзды класс W':{e:'🌐',g:'rgba(80,100,220,.45)',t:['Вольфа-Райе','5–50 М☉','Без водорода'],d:'Звёзды класса W (Вольфа-Райе, WR) — особый класс чрезвычайно массивных, горячих и светящихся звёзд с уникальными спектральными особенностями. Они лишились водородной оболочки через мощный звёздный ветер, обнажив слои с продуктами ядерного горения. Температура поверхности 25 000–100 000 К.'},
            'Звёзды класс C, S':{e:'🔸',g:'rgba(200,130,50,.4)',t:['Углеродные','Тип C и S','Гиганты'],d:'Звёзды класса C (углеродные) и S — особые типы красных гигантов на асимптотической ветви гигантов. Класс C богат углеродом и его соединениями. Класс S (циркониевые) содержат много оксида циркония — промежуточный тип между кислородными (M) и углеродными (C) звёздами.'},
            'Коричневые карлики':{e:'🟤',g:'rgba(160,80,30,.4)',t:['13–80 М♃','Дейтерий','Субзвёздный объект'],d:'Коричневые карлики — субзвёздные объекты с массой 13–80 масс Юпитера, слишком лёгкие для устойчивого синтеза водорода. Могут кратковременно сжигать дейтерий. Являются промежуточным состоянием между планетой и звездой. Первый коричневый карлик (Teide 1) открыт в 1995 г.'},
            'Голубой гигант':{e:'🔷',g:'rgba(60,130,255,.5)',t:['Класс B/O','Горячий гигант','После ГП'],d:'Голубой гигант — горячая массивная звезда класса O или B после главной последовательности, ещё не успевшая расшириться в сверхгигант. Температура поверхности >10 000 К. Чрезвычайно яркие и редкие объекты. Некоторые голубые гиганты являются пульсирующими переменными — β Цефея.'},
            'Голубой сверхгигант':{e:'🔵',g:'rgba(60,120,255,.5)',t:['Класс B/O Ia','Ригель','~10–100 М☉'],d:'Голубой сверхгигант — массивная звезда класса O или B, класс светимости Ia/Ib. Температура поверхности 10 000–50 000 К. Ригель (β Ориона) — классический пример: светимость в 120 000 раз выше солнечной, масса ~21 М☉. Стадия короткая — звезда быстро эволюционирует в жёлтый или красный сверхгигант.'},
            'Красный сверхгигант':{e:'🟠',g:'rgba(220,70,30,.5)',t:['8–35 М☉','Бетельгейзе','Крупнейшие по размеру'],d:'Красный сверхгигант — самые крупные звёзды Вселенной по размеру. Образуются из звёзд 8–35 М☉ после исчерпания водорода в ядре. Радиус в 500–1500 раз превышает солнечный. Бетельгейзе (~900 R☉) — один из ближайших. Температура поверхности 3000–4500 К. Предшествует взрыву сверхновой типа II.'},
            'Сверхновая':{e:'💥',g:'rgba(255,120,30,.6)',t:['Взрыв','Тип II / Ib / Ic','Синтез элементов'],d:'Сверхновая — катастрофический взрыв, знаменующий конец жизни массивной звезды (>8 М☉). При коллапсе железного ядра выделяется ~10⁴⁴ Дж за доли секунды. 99% энергии уносится нейтрино. В остатке — нейтронная звезда или чёрная дыра. Синтезируются все тяжёлые элементы таблицы Менделеева.'},
            'Звёзды Вольфа-Райе (WR)':{e:'🌐',g:'rgba(80,100,220,.45)',t:['Подклассы WN/WC/WO','Без водорода','Мощный ветер'],d:'Звёзды Вольфа-Райе — горячие, крайне яркие звёзды, лишившиеся водородной оболочки через мощный звёздный ветер. В спектре отсутствуют линии водорода, зато ярко выражены He, C, N или O. Подкласс WN — богат азотом (ранняя стадия), WC — углеродом (промежуточная), WO — кислородом (финальная). Предшественники сверхновых Ib/c.'},
            'Подкласс WN':{e:'💜',g:'rgba(80,60,180,.4)',t:['Азот','Ранняя стадия WR'],d:'Подкласс WN — ранняя стадия эволюции WR-звёзд. Звезда сбросила водородную оболочку, обнажив слои, обогащённые азотом. В спектре доминируют линии азота и гелия.'},
            'Подкласс WC':{e:'💜',g:'rgba(80,60,180,.4)',t:['Углерод','Промежуточная стадия WR'],d:'Подкласс WC — промежуточная стадия эволюции WR-звёзд. В соединениях преобладает углерод. Дальнейшая потеря массы обнажает слои с продуктами горения гелия (углерод, кислород).'},
            'Подкласс WO':{e:'💜',g:'rgba(80,60,180,.4)',t:['Кислород','Финальная стадия WR','10³–10⁴ лет'],d:'Подкласс WO — финальная стадия эволюции WR-звёзд перед взрывом сверхновой. В соединениях преобладает кислород. Длится всего 10³–10⁴ лет — это самые «обнажённые» звёзды, открывающие глубочайшие слои.'},
            'Подкласс WN/C':{e:'💜',g:'rgba(80,60,180,.4)',t:['Промежуточный','N и C','Редкий'],d:'Подкласс WN/C — редкий переходный тип между азотной (WN) и углеродной (WC) последовательностями WR-звёзд. Имеет промежуточные характеристики — в спектре присутствуют как линии азота, так и углерода.'},
            'Подкласс WNh':{e:'💜',g:'rgba(80,60,180,.4)',t:['Водород-содержащий','M☉ > 75','WR+H'],d:'Подкласс WNh — особый подтип с высоким содержанием водорода. Представляет массивные звёзды главной последовательности (>75 М☉), которые ещё не потеряли водородную оболочку полностью. Переходные объекты между O-звёздами и классическими WR-звёздами.'},
            'Красный гигант':{e:'🔴',g:'rgba(255,60,40,.5)',t:['0.5–8 М☉','Расширение','Гелиевый синтез'],d:'Красный гигант — стадия эволюции звёзд 0.5–8 М☉ после исчерпания водорода. Ядро сжимается, а внешние слои расширяются до сотен солнечных радиусов. Температура поверхности 3500–5000 К. В ядре начинается синтез гелия в углерод (тройной альфа-процесс).'},
            'Сброс оболочки':{e:'🌀',g:'rgba(70,200,150,.4)',t:['Асимптотическая ветвь','Ветер','АГБ'],d:'Сброс оболочки — финальный этап эволюции звёзд малой/средней массы на асимптотической ветви гигантов (АГБ). Нестабильные пульсации и мощный звёздный ветер сдувают внешние оболочки звезды, образуя планетарную туманность вокруг горячего центрального остатка.'},
            'Планетарная туманность':{e:'🌀',g:'rgba(70,200,150,.45)',t:['Ионизированный газ','~10 000 лет','Белый карлик в центре'],d:'Планетарная туманность — светящаяся оболочка ионизированного газа, сброшенного звездой средней массы. В центре — горячий белый карлик, чьё УФ-излучение заставляет газ светиться. Туманность Кольцо (M57), Туманность Кошачий Глаз — классические примеры. Существует около 10 000 лет.'},
            'Белый карлик':{e:'💠',g:'rgba(140,170,255,.5)',t:['< 1.4 М☉','Размером с Землю','Предел Чандрасекара'],d:'Белый карлик — конечный этап эволюции звёзд с массой до ~8 М☉. Размером с Землю, масса ~0.6 М☉. Поддерживается давлением вырожденного электронного газа. Без термоядерных реакций — лишь медленно остывает. 97% всех звёзд закончат жизнь белым карликом. Предел Чандрасекара: 1.4 М☉.'},
            'Чёрный карлик':{e:'⬛',g:'rgba(60,60,80,.3)',t:['Теоретический','Остывший белый карлик','10¹⁵–10¹⁶ лет'],d:'Чёрный карлик — гипотетическое конечное состояние полностью остывшего белого карлика. Время остывания 10¹⁵–10¹⁶ лет многократно превышает возраст Вселенной, поэтому чёрных карликов в наблюдаемой Вселенной пока не существует. Является чисто теоретическим объектом.'},
            'Нейтронная звезда':{e:'💫',g:'rgba(60,200,220,.5)',t:['1.4–3 М☉','~20 км','Ядерная плотность'],d:'Нейтронная звезда — сверхплотный остаток после взрыва сверхновой (8–25 М☉). Масса 1.4–3 М☉ сжата до диаметра ~20 км. Плотность ядерная: чайная ложка — сотни миллионов тонн. Состоит почти целиком из нейтронов. Поверхностная гравитация в 200 млрд раз сильнее земной.'},
            'Чёрная дыра':{e:'🕳️',g:'rgba(80,30,180,.5)',t:['M☉ > 25','Горизонт событий','Сингулярность'],d:'Чёрная дыра звёздной массы образуется при коллапсе ядра звезды >25 М☉. Гравитация настолько сильна, что свет не может покинуть область внутри горизонта событий. Первое прямое наблюдение гравитационных волн от слияния двух ЧД — LIGO, 2015. Существуют также «спящие» чёрные дыры без аккреции.'},
            'Пульсар':{e:'📡',g:'rgba(50,220,190,.45)',t:['Нейтронная звезда','Периодические импульсы','До 716 об/с'],d:'Пульсар — быстро вращающаяся нейтронная звезда с мощным магнитным полем, излучающая периодические импульсы. Ось магнитного поля не совпадает с осью вращения — пучок «подметает» пространство как маяк. Первый пульсар открыт Джослин Белл в 1967 г. Миллисекундные пульсары точнее атомных часов.'},
            'Магнитар':{e:'🧲',g:'rgba(80,255,180,.45)',t:['~10¹⁵ Гс','Гамма-вспышки','~30 в Галактике'],d:'Магнитар — нейтронная звезда с магнитным полем ~10¹⁵ Гс, в 1000 раз сильнее обычных. Своим полем способны буквально разрывать кору звезды. Периодически испускают мощнейшие гамма-вспышки. Вспышка SGR 1806-20 в 2004 г. ионизировала ионосферу Земли с 50 000 световых лет.'},
            'Изолированные нейтронные звёзды':{e:'⭐',g:'rgba(60,180,200,.4)',t:['Постаревшие','Одиночные','Остывающие'],d:'Изолированные нейтронные звёзды (INS) — постаревшие нейтронные звёзды, у которых уже иссяк ресурс вращательной энергии для излучения радиоимпульсов. Одиночные, медленно остывают. Наблюдаются в рентгеновском диапазоне — т.н. «Великолепная семёрка» вблизи Солнца.'},
            'Квазар':{e:'✨',g:'rgba(190,100,255,.5)',t:['АЯГ','Сверхмассивная ЧД','Ранняя Вселенная'],d:'Квазар — чрезвычайно яркое активное ядро далёкой галактики, питаемое аккрецией на сверхмассивную чёрную дыру (10⁶–10¹⁰ М☉). Светимость в триллионы раз выше солнечной. Один из ближайших — 3C 273 (2.4 млрд св. лет). Квазары доминировали в ранней Вселенной.'},
            'Блазар':{e:'⚡',g:'rgba(180,70,255,.5)',t:['Джет к наблюдателю','Переменный','BL Lac / FSRQ'],d:'Блазар — квазар, чей релятивистский джет направлен практически прямо на наблюдателя. Это делает блазары исключительно яркими переменными источниками от радио до гамма. Блазар и квазар — по сути одно и то же, только у блазара джеты «светят нам в лицо», а у квазара — в стороны.'},
            'Микроквазар':{e:'🌀',g:'rgba(150,80,220,.45)',t:['Слабое излучение','Нейтронная звезда/ЧД','Двойная система'],d:'Микроквазар — рентгеновская двойная система (нейтронная звезда или чёрная дыра + компаньон) с относительно слабыми джетами. Уменьшенная модель квазара: те же физические процессы аккреции и выброса джетов, только в масштабе звёздной массы. Характерно слабое, переменное излучение.'},
            'Активно «питающаяся» чёрная дыра':{e:'🕳️',g:'rgba(100,40,200,.5)',t:['Аккреция','«Плодородная» среда','АЯГ'],d:'Чёрная дыра в «плодородной» среде с достаточным количеством вещества для аккреции становится источником мощного излучения. В зависимости от интенсивности и направления джетов такие объекты классифицируются как микроквазары, квазары или блазары.'},
            'Спящая чёрная дыра':{e:'🕳️',g:'rgba(60,30,120,.4)',t:['Нет аккреции','Неактивная','X-ray transient'],d:'Спящая (неактивная) чёрная дыра — чёрная дыра, лишённая достаточного притока вещества для активной аккреции. Практически не излучает, обнаруживается только через гравитационное влияние на компаньона в двойной системе или через транзиентную рентгеновскую активность.'},
            'Жёлтый карлик':{e:'🌕',g:'rgba(255,210,60,.4)',t:['Класс G','Главная последовательность','Солнце'],d:'Жёлтый карлик — звезда класса G главной последовательности с температурой 5200–6000 К и массой 0.8–1.04 М☉. Наше Солнце — типичный жёлтый карлик (G2V). Живут около 10 млрд лет, после чего расширяются в красные гиганты. Хорошие кандидаты для систем с обитаемыми планетами.'},
            'Оранжевый карлик':{e:'🟠',g:'rgba(230,140,50,.4)',t:['Класс K','0.5–0.8 М☉','14–34 млрд лет'],d:'Оранжевый карлик — звезда класса K главной последовательности с температурой 3700–5200 К и массой 0.5–0.8 М☉. Живут 14–34 млрд лет — дольше нашего Солнца. Считаются перспективными для жизни: достаточно стабильны, долгоживущи и не слишком активны в ультрафиолете.'},
            'Бариевая звезда':{e:'⚗️',g:'rgba(150,130,60,.4)',t:['Класс G или K','Барий','Двойная система'],d:'Бариевая звезда — гигант класса G или K с аномально высоким содержанием бария и других элементов s-процесса. Обогащение произошло в результате переноса вещества от компаньона-звезды AGB в прошлом (сейчас компаньон — белый карлик). Один из ключевых признаков взаимодействия в двойных системах.'},
            'Красный сверхгигант (ветвь M)':{e:'🔴',g:'rgba(220,60,30,.5)',t:['0.2–0.5 М☉','Медленная эволюция'],d:'Красный сверхгигант из ветви звёзд класса M с массой 0.2–0.5 М☉. Эти звёзды эволюционируют медленнее, чем их более массивные собратья. Конечной стадией станет белый карлик.'},
            'Голубой карлик':{e:'🔹',g:'rgba(60,140,255,.4)',t:['Теоретический','M☉ < 0.2','Будущее красных карликов'],d:'Голубой карлик — теоретический объект, в который со временем превратится маломассивный красный карлик (M☉ < 0.2). По мере сжигания водорода ядро уплотняется, температура растёт, и звезда становится горячее и голубее, прежде чем превратиться в белый карлик. Ни одного голубого карлика пока не наблюдалось — Вселенная ещё недостаточно стара.'},
            'Циркониевая звезда Тип S':{e:'🔶',g:'rgba(200,130,50,.4)',t:['Тип S','Цирконий','АГБ-звезда'],d:'Циркониевая звезда типа S — красный гигант или АГБ-звезда с аномально высоким содержанием оксида циркония и других оксидов металлов. Промежуточный тип между кислородными (M) и углеродными (C) звёздами. В спектре заметны молекулярные полосы ZrO.'},
            'Углеродная звезда Тип C':{e:'🟤',g:'rgba(180,100,30,.4)',t:['Тип C','Углерод','АГБ-звезда'],d:'Углеродная звезда типа C — красный гигант или АГБ-звезда, в атмосфере которой углерода больше, чем кислорода (C/O > 1). Из-за этого в атмосфере образуются молекулы углерода (C₂, CN, CH), придавая звезде характерный красноватый цвет. Конечный продукт обогащения вещества через третий подъём гелия.'},
            'Сверхмассивная тёмная звезда':{e:'🌑',g:'rgba(100,50,150,.4)',t:['Теоретический','Тёмная материя','Ранняя Вселенная'],d:'Сверхмассивная тёмная звезда — гипотетический объект ранней Вселенной, образованный из тёмной материи. В отличие от обычных звёзд, светится за счёт аннигиляции частиц тёмной материи внутри, а не термоядерного синтеза. Масса до 10⁸ М☉. Возможно, являлись предшественниками сверхмассивных чёрных дыр.'},
            'Тёмный карлик':{e:'🌑',g:'rgba(50,20,80,.4)',t:['Коричневый карлик','Полностью остывший','Теоретический'],d:'«Тёмный карлик» — полностью остывший коричневый карлик, исчерпавший все источники энергии (в т.ч. дейтерий). Теоретический объект; из-за малой массы и слабого излучения крайне трудно обнаруживается. Не путать с чёрным карликом (остывший белый карлик).'},
            'Взрыв сверхновой':{e:'💥',g:'rgba(255,100,20,.6)',t:['Финал','Коллапс','10⁴⁴ Дж'],d:'Взрыв сверхновой — катастрофическое высвобождение энергии при коллапсе ядра массивной звезды или термоядерном взрыве белого карлика. За доли секунды выделяется больше энергии, чем Солнце излучает за всю жизнь. Гипотетически «железная» звезда (полностью из Fe-56) может также взорваться.'},
            '«Железная» звезда':{e:'⚙️',g:'rgba(120,120,140,.4)',t:['Теоретический','Fe-56','10¹⁰⁰⁰ лет'],d:'«Железная» звезда — гипотетический объект, состоящий почти полностью из изотопа железо-56. Через чрезвычайно долгое время (~10¹⁰⁰⁰ лет) все атомы других элементов распадутся до железа через квантовые туннельные эффекты. Звезда становится своего рода планетоподобным объектом с железным ядром.'},
            'Кварковая звезда':{e:'⚛️',g:'rgba(80,180,150,.45)',t:['Гипотетический','Кварк-глюонная плазма','Плотнее нейтронной'],d:'Кварковая звезда — гипотетическая следующая стадия после нейтронной звезды. Содержит кварковую материю (кварк-глюонную плазму) — привычные частицы (протоны, нейтроны) распались до составляющих кварков. Плотность выше ядерной.'},
            'Преонная звезда':{e:'🔬',g:'rgba(60,200,180,.45)',t:['Гипотетический','10²⁰ г/см³','~10 м в диаметре'],d:'Преонная звезда — гипотетический объект, идущий после кварковой звезды. Кварки там распадаются на ещё более мелкие фундаментальные частицы — преоны. Плотность ~10²⁰ г/см³, масса до ~100 М☉, но диаметр всего около 10 метров. Крайне теоретический объект.'},
            'Странные звёзды':{e:'🌌',g:'rgba(100,150,200,.4)',t:['Кварковое вещество','Странные кварки','Стабильность?'],d:'Странные звёзды — гипотетические объекты из стабильного кваркового вещества, содержащего странные кварки (up, down, strange). Если «странная материя» термодинамически стабильна (гипотеза Виттена), такие объекты могут существовать как конкурирующая с нейтронными звёздами форма вещества.'},
            'Q-звезда (Серая дыра)':{e:'⭕',g:'rgba(100,100,120,.4)',t:['Гипотетический','Без горизонта событий','Экзотика'],d:'Q-звезда (или серая дыра) — гипотетический компактный объект, состоящий из экзотического вещества и внешне похожий на чёрную дыру, но без горизонта событий. Теоретически может существовать в диапазоне масс между нейтронными звёздами и чёрными дырами.'},
            'Сверхгигант':{e:'🔶',g:'rgba(220,100,40,.5)',t:['Класс I','Очень яркие','Редкие'],d:'Сверхгиганты — звёзды класса светимости I, наиболее яркие и крупные после гипергигантов. Делятся на горячих (голубые, белые) и холодных (жёлтые, красные). Масса 10–70 М☉, светимость 10⁴–10⁶ L☉. Денеб (α Лебедя) — один из самых ярких сверхгигантов северного неба.'},
            'Яркие гиганты':{e:'🟡',g:'rgba(230,190,60,.4)',t:['Класс II','Промежуточные'],d:'Яркие гиганты класса II — промежуточный класс между нормальными гигантами (III) и сверхгигантами (I). Крупнее и ярче гигантов, но не достигают светимости сверхгигантов. Температура и масса варьируются от горячих голубых до прохладных оранжевых.'},
            'Гиганты':{e:'🟠',g:'rgba(220,150,50,.4)',t:['Класс III','После ГП','10–100 R☉'],d:'Гиганты класса III — звёзды, покинувшие главную последовательность и расширившиеся в 10–100 раз. Arcturus (α Волопаса) — ярчайший красный гигант северного неба. Aldebaran — оранжевый гигант в 44 раза крупнее Солнца.'},
            'Звёзды главной последовательности (Карлики)':{e:'⭐',g:'rgba(100,180,255,.4)',t:['Класс V','Синтез H→He','90% всех звёзд'],d:'Звёзды главной последовательности (карлики) — класс светимости V, самый распространённый (~90% всех звёзд). Термоядерный синтез водорода в гелий уравновешивает гравитацию. Солнце — G2V. Диапазон масс: от 0.08 М☉ (красные карлики) до >100 М☉ (O-звёзды).'},
            'Субкарлики':{e:'🔹',g:'rgba(100,130,200,.4)',t:['Класс VI','Низкая металличность','Ниже ГП'],d:'Субкарлики класса VI расположены ниже главной последовательности на диаграмме ГР. Низкое содержание тяжёлых элементов уменьшает непрозрачность — при той же температуре они имеют меньший радиус. Как правило, старые звёзды галактического гало или шаровых скоплений.'},

            // Cloud node: canvas x=-440, y=-30, w=270, h=120
            // Centre of the node in viewport coords:
            const NEBULA_CX = cx(-440) + 135;   // node centre-x
            const NEBULA_CY = cy(-30)  + 60;    // node centre-y
            const NEBULA_R  = 460;              // visual radius of the nebula

            const nebCvs = document.getElementById('nebulaCvs');
            const nebCtx = nebCvs.getContext('2d');
            const NEB_PAD = 80;

            nebCvs.width  = NEBULA_R * 2 + NEB_PAD * 2;
            nebCvs.height = NEBULA_R * 2 + NEB_PAD * 2;
            nebCvs.style.left = (NEBULA_CX - NEBULA_R - NEB_PAD) + 'px';
            nebCvs.style.top  = (NEBULA_CY - NEBULA_R - NEB_PAD) + 'px';

            // Local origin (centre of the canvas)
            const NLX = NEBULA_R + NEB_PAD;
            const NLY = NEBULA_R + NEB_PAD;

            // Pre-baked micro-star positions (deterministic PRNG so they don't jump)
            const nebStars = Array.from({ length: 70 }, (_, i) => {
                // Simple deterministic hash
                const h1 = Math.sin(i * 127.1) * 43758.5453;
                const h2 = Math.sin(i * 311.7) * 43758.5453;
                const h3 = Math.sin(i * 74.9)  * 43758.5453;
                const rand = v => v - Math.floor(v);
                const angle = rand(h1) * Math.PI * 2;
                const dist  = rand(h2) * NEBULA_R * 0.82;
                return {
                    x:  NLX + Math.cos(angle) * dist,
                    y:  NLY + Math.sin(angle) * dist * 0.85,
                    r:  0.5 + rand(h3) * 1.6,
                    b:  0.25 + rand(Math.sin(i * 53.3) * 9999.9) * 0.75,
                };
            });

            function drawNebula(t) {
                const c = nebCtx;
                c.clearRect(0, 0, nebCvs.width, nebCvs.height);

                // ── Layer 1: large diffuse outer glow (magenta/rose)
                const g1 = c.createRadialGradient(NLX, NLY, 0, NLX, NLY, NEBULA_R);
                g1.addColorStop(0.00, 'rgba(190, 55, 110, 0.30)');
                g1.addColorStop(0.40, 'rgba(150, 30,  80, 0.20)');
                g1.addColorStop(0.72, 'rgba( 90, 10,  55, 0.09)');
                g1.addColorStop(1.00, 'rgba(  0,  0,   0, 0.00)');
                c.fillStyle = g1;
                c.beginPath();
                c.ellipse(NLX, NLY, NEBULA_R, NEBULA_R * 0.80, -0.25, 0, Math.PI * 2);
                c.fill();

                // ── Layer 2: bright inner core (hot pink), slightly off-centre
                const g2 = c.createRadialGradient(NLX - 50, NLY - 35, 0, NLX - 50, NLY - 35, NEBULA_R * 0.52);
                g2.addColorStop(0.00, 'rgba(240, 100, 155, 0.60)');
                g2.addColorStop(0.30, 'rgba(205,  65, 120, 0.38)');
                g2.addColorStop(0.70, 'rgba(150,  35,  80, 0.16)');
                g2.addColorStop(1.00, 'rgba(  0,   0,   0, 0.00)');
                c.fillStyle = g2;
                c.beginPath();
                c.ellipse(NLX - 50, NLY - 35, NEBULA_R * 0.52, NEBULA_R * 0.42, 0.4, 0, Math.PI * 2);
                c.fill();

                // ── Layer 3: blue/purple lobe (upper-right), like in the reference photo
                const g3 = c.createRadialGradient(NLX + 95, NLY - 100, 0, NLX + 95, NLY - 100, NEBULA_R * 0.42);
                g3.addColorStop(0.00, 'rgba(110, 145, 245, 0.42)');
                g3.addColorStop(0.45, 'rgba( 75, 100, 210, 0.22)');
                g3.addColorStop(1.00, 'rgba(  0,   0,   0, 0.00)');
                c.fillStyle = g3;
                c.beginPath();
                c.ellipse(NLX + 95, NLY - 100, NEBULA_R * 0.42, NEBULA_R * 0.34, -0.55, 0, Math.PI * 2);
                c.fill();

                // ── Layer 4: dark dust lanes (multiply blend simulated with dark fills)
                const dustLanes = [
                    { ox: -25, oy:  18, rx: 175, ry: 30, rot:  0.55, a: 0.52 },
                    { ox:  55, oy:  -8, rx: 115, ry: 20, rot: -0.28, a: 0.44 },
                    { ox: -65, oy: -55, rx:  85, ry: 16, rot:  0.85, a: 0.38 },
                    { ox:  10, oy:  80, rx: 130, ry: 22, rot:  0.15, a: 0.30 },
                ];
                c.save();
                c.globalCompositeOperation = 'multiply';
                dustLanes.forEach(d => {
                    const gd = c.createRadialGradient(
                        NLX + d.ox, NLY + d.oy, 0,
                        NLX + d.ox, NLY + d.oy, d.rx
                    );
                    gd.addColorStop(0.0, `rgba(8, 0, 18, ${d.a})`);
                    gd.addColorStop(0.5, `rgba(8, 0, 18, ${d.a * 0.35})`);
                    gd.addColorStop(1.0, 'rgba(0, 0, 0, 0)');
                    c.fillStyle = gd;
                    c.beginPath();
                    c.ellipse(NLX + d.ox, NLY + d.oy, d.rx, d.ry, d.rot, 0, Math.PI * 2);
                    c.fill();
                });
                c.restore();

                // ── Layer 5: micro-stars scattered inside the nebula
                nebStars.forEach(s => {
                    const sg = c.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3.5);
                    sg.addColorStop(0,   `rgba(255,255,255,${s.b})`);
                    sg.addColorStop(0.4, `rgba(220,205,255,${s.b * 0.4})`);
                    sg.addColorStop(1,   'rgba(0,0,0,0)');
                    c.fillStyle = sg;
                    c.beginPath();
                    c.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
                    c.fill();

                // ── Layer 6: slow animated breathing glow on the core
                const pulse = 0.13 + 0.06 * Math.sin(t * 0.00075);
                const gp = c.createRadialGradient(NLX - 30, NLY - 25, 0, NLX - 30, NLY - 25, NEBULA_R * 0.38);

                const ah = a.el.offsetHeight||a.h||60;
                const bh = b.el.offsetHeight||b.h||60;

                // right side of a → left side of b
                const ax = a.x + a.w;
                const ay = a.y + ah/2;
                const bx2 = b.x;
                const by = b.y + bh/2;

                const mkid = `mk${idx}`;
                const mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
                mk.setAttribute('id',mkid);mk.setAttribute('markerWidth','7');mk.setAttribute('markerHeight','7');
                mk.setAttribute('refX','6');mk.setAttribute('refY','3.5');mk.setAttribute('orient','auto');
                const mkp = document.createElementNS('http://www.w3.org/2000/svg','path');
                mkp.setAttribute('d','M0,0 L0,7 L7,3.5 z');
                mkp.setAttribute('fill',color||'#708090');mkp.setAttribute('opacity','.75');
                mk.appendChild(mkp);defs.appendChild(mk);

                const path = document.createElementNS('http://www.w3.org/2000/svg','path');
                let d;
                const dy = Math.abs(ay-by);
                if(dy < 5){
                d = `M${ax},${ay} L${bx2},${by}`;
                } else {
                // right-angle elbow
                const mx = (ax+bx2)/2;
                d = `M${ax},${ay} L${mx},${ay} L${mx},${by} L${bx2},${by}`;
                }
                path.setAttribute('d',d);
                path.setAttribute('fill','none');
                path.setAttribute('stroke',color||'#708090');
                path.setAttribute('stroke-width','1.6');
                path.setAttribute('opacity','.55');
                path.setAttribute('marker-end',`url(#${mkid})`);
                if(dashed==='dashed') path.setAttribute('stroke-dasharray','7,4');
                svg.appendChild(path);
            });
            }
            setTimeout(drawArrows, 180);

            // ── LUMINOSITY TREE: vertical top-down arrows ─────────────────────
            // Drawn as proper fan: header bottom-centre → each row-1 top-centre
            // then row-1 bottom-centre → row-2 top-centre
            function drawLumTree() {
                // helper: draw one arrowhead-tipped vertical/fan path
                function lumArrow(x1, y1, x2, y2, color, idx) {
                    const mkid = `lmk${idx}`;
                    const mk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                    mk.setAttribute('id', mkid);
                    mk.setAttribute('markerWidth', '7');
                    mk.setAttribute('markerHeight', '7');
                    mk.setAttribute('refX', '3.5');
                    mk.setAttribute('refY', '6');
                    mk.setAttribute('orient', 'auto');
                    const mkp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    mkp.setAttribute('d', 'M0,0 L7,0 L3.5,7 z');
                    mkp.setAttribute('fill', color);
                    mkp.setAttribute('opacity', '.7');
                    mk.appendChild(mkp);
                    defs.appendChild(mk);

                    // elbow: go straight down from x1,y1 to midY, then to x2,midY, then down to x2,y2
                    const midY = y1 + (y2 - y1) * 0.5;
                    let d;
                    if (Math.abs(x1 - x2) < 3) {
                        d = `M${x1},${y1} L${x2},${y2}`;
                    } else {
                        d = `M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2}`;
                    }

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', d);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', color);
                    path.setAttribute('stroke-width', '1.6');
                    path.setAttribute('opacity', '.55');
                    path.setAttribute('marker-end', `url(#${mkid})`);
                    svg.appendChild(path);
                }

                // Node centre-bottom / centre-top helpers
                function bot(id) {
                    const n = nm[id];
                    const h = n.el.offsetHeight || n.h || 60;
                    return { x: n.x + n.w / 2, y: n.y + h };
                }
                function top(id) {
                    const n = nm[id];
                    return { x: n.x + n.w / 2, y: n.y };
                }

                let li = 2000; // index offset to avoid conflict with EDGES markers

                // ── Row 0 → Row 1  (header fans out to 8 nodes)
                const r1nodes = ['lum_sg','lum_bg','lum_g','lum_sub','lum_ms','lum_msd','lum_subk','lum_wd'];
                const r1colors = ['#c08030','#c0a030','#c0a030','#60b060','#4080c0','#4080c0','#808090','#8090c0'];
                const hdrBot = bot('lum_hdr');
                r1nodes.forEach((id, i) => {
                    const t = top(id);
                    lumArrow(hdrBot.x, hdrBot.y, t.x, t.y, r1colors[i], li++);
                });

                // ── Row 1 → Row 2 (lum_g → gblue, gred)
                const gBot = bot('lum_g');
                lumArrow(gBot.x, gBot.y, top('lum_gblue').x, top('lum_gblue').y, '#5090d0', li++);
                lumArrow(gBot.x, gBot.y, top('lum_gred').x,  top('lum_gred').y,  '#c04030', li++);

                // ── Row 1 → Row 2 (lum_ms → gyel, gora, bred)
                const msBot = bot('lum_ms');
                lumArrow(msBot.x, msBot.y, top('lum_gyel').x, top('lum_gyel').y, '#c0c020', li++);
                lumArrow(msBot.x, msBot.y, top('lum_gora').x, top('lum_gora').y, '#c07030', li++);
                lumArrow(msBot.x, msBot.y, top('lum_bred').x, top('lum_bred').y, '#c04030', li++);

                // ── Row 1 → Row 2 (lum_msd → msblu, gyel2)
                const msdBot = bot('lum_msd');
                lumArrow(msdBot.x, msdBot.y, top('lum_msblu').x, top('lum_msblu').y, '#5090d0', li++);
                lumArrow(msdBot.x, msdBot.y, top('lum_gyel2').x, top('lum_gyel2').y, '#c0c020', li++);
            }

            setTimeout(drawLumTree, 220);

            // ── PAN ──────────────────────────────────────────────────────────
            // Start view centered on main flow
            let tx = -OX + 200, ty = -OY + 300;
            let dr = false, ox2, oy2;
            function applyT(){vp.style.transform=`translate(${tx}px,${ty}px)`;}
            applyT();
            document.addEventListener('mousedown',e=>{
            if(e.target.closest('#mOv')||e.target.closest('#backBtn'))return;
            dr=true;ox2=e.clientX-tx;oy2=e.clientY-ty;document.body.classList.add('drag');
            });
            document.addEventListener('mousemove',e=>{
            if(!dr)return;
            tx=e.clientX-ox2;ty=e.clientY-oy2;
            tx=Math.min(300,Math.max(-(6200-innerWidth+300),tx));
            ty=Math.min(300,Math.max(-(4800-innerHeight+300),ty));
            applyT();
            });
            document.addEventListener('mouseup',()=>{dr=false;document.body.classList.remove('drag');});
            let tox2,toy2;
            document.addEventListener('touchstart',e=>{tox2=e.touches[0].clientX-tx;toy2=e.touches[0].clientY-ty;},{passive:true});
            document.addEventListener('touchmove',e=>{
            tx=e.touches[0].clientX-tox2;ty=e.touches[0].clientY-toy2;
            tx=Math.min(300,Math.max(-(6200-innerWidth+300),tx));
            ty=Math.min(300,Math.max(-(4800-innerHeight+300),ty));
            applyT();
            },{passive:true});

            // ── MODAL ────────────────────────────────────────────────────────
            function openModal(title, info){
            document.getElementById('mTitle').textContent=title;
            document.getElementById('mDesc').textContent=info.d;
            document.getElementById('mEmoji').textContent=info.e;
            document.getElementById('mIcon').style.setProperty('--mgl',info.g);
            document.getElementById('mTitle').style.textShadow=`0 0 40px ${info.g}`;
            const t=document.getElementById('mTags');t.innerHTML='';
            (info.t||[]).forEach(s=>{const sp=document.createElement('span');sp.className='tag';sp.textContent=s;t.appendChild(sp);});
            document.getElementById('mOv').classList.add('on');
            }
            document.getElementById('mClose').onclick=()=>document.getElementById('mOv').classList.remove('on');
            document.getElementById('mOv').addEventListener('click',e=>{if(e.target===document.getElementById('mOv'))document.getElementById('mOv').classList.remove('on');});
            document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('mOv').classList.remove('on');document.getElementById('termOv').classList.remove('on');}});

            // ── TERMINOLOGY OVERLAY ──────────────────────────────────────────
            const termOv    = document.getElementById('termOv');
            const termList  = document.getElementById('termList');
            const termSearch = document.getElementById('termSearch');

            // Build sorted entries from DB
            const termEntries = Object.entries(DB).sort((a, b) => a[0].localeCompare(b[0], 'ru'));

            function renderTerms(filter) {
                const q = (filter || '').toLowerCase().trim();
                termList.innerHTML = '';
                termEntries.forEach(([name, info]) => {
                    if (q && !name.toLowerCase().includes(q) && !info.d.toLowerCase().includes(q)) return;

                    const card = document.createElement('div');
                    card.className = 'term-card';

                    // Head: emoji + name
                    const head = document.createElement('div');
                    head.className = 'term-card-head';

                    const em = document.createElement('span');
                    em.className = 'term-emoji';
                    em.textContent = info.e || '✦';

                    const nm2 = document.createElement('span');
                    nm2.className = 'term-name';
                    nm2.textContent = name;

                    head.appendChild(em);
                    head.appendChild(nm2);

                    // Description
                    const desc = document.createElement('div');
                    desc.className = 'term-desc';
                    desc.textContent = info.d;

                    card.appendChild(head);
                    card.appendChild(desc);

                    // Tags (if present)
                    if (info.t && info.t.length) {
                        const tags = document.createElement('div');
                        tags.className = 'term-tags';
                        info.t.forEach(t => {
                            const sp = document.createElement('span');
                            sp.className = 'term-tag';
                            sp.textContent = t;
                            tags.appendChild(sp);
                        });
                        card.appendChild(tags);
                    }

                    termList.appendChild(card);
                });
            }

            // Open
            document.getElementById('termBtn').addEventListener('click', () => {
                termSearch.value = '';
                renderTerms('');
                termOv.classList.add('on');
                setTimeout(() => termSearch.focus(), 180);
            });

            // Close
            document.getElementById('termClose').onclick = () => termOv.classList.remove('on');
            termOv.addEventListener('click', e => { if (e.target === termOv) termOv.classList.remove('on'); });

            // Live search
            termSearch.addEventListener('input', () => renderTerms(termSearch.value));
        </script>
    </body>
</html>
