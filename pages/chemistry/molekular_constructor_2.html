<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Molecular Structure Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e14;
            color: #e6e6e6;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-panel {
            position: fixed;
            background: linear-gradient(145deg, rgba(20, 28, 38, 0.95), rgba(15, 22, 30, 0.98));
            border: 1px solid rgba(80, 200, 170, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 100;
        }

        .control-panel {
            top: 20px;
            left: 20px;
            width: 280px;
        }

        .info-panel {
            top: 20px;
            right: 20px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
        }

        .legend-panel {
            bottom: 20px;
            left: 20px;
            width: 200px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #50c8aa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            border-bottom: 2px solid rgba(80, 200, 170, 0.3);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 14px;
            color: #50c8aa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #8a9aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(80, 200, 170, 0.3);
            border-radius: 8px;
            background: rgba(30, 40, 55, 0.8);
            color: #e6e6e6;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        select:hover, button:hover {
            border-color: #50c8aa;
            background: rgba(80, 200, 170, 0.1);
        }

        select:focus, button:focus {
            outline: none;
            border-color: #50c8aa;
            box-shadow: 0 0 15px rgba(80, 200, 170, 0.3);
        }

        button {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.active {
            background: linear-gradient(135deg, #50c8aa, #3a9d8a);
            border-color: #50c8aa;
            color: #0a0e14;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group button {
            flex: 1;
        }

        .molecule-info {
            font-size: 13px;
            line-height: 1.6;
            color: #b8c8d8;
        }

        .atom-info {
            background: rgba(80, 200, 170, 0.1);
            border-left: 3px solid #50c8aa;
            padding: 12px;
            margin-top: 10px;
            border-radius: 0 8px 8px 0;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bond-list {
            margin-top: 10px;
        }

        .bond-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .bond-type {
            color: #50c8aa;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-text {
            font-size: 24px;
            color: #50c8aa;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid rgba(80, 200, 170, 0.2);
            margin-top: 10px;
            font-size: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #50c8aa;
        }

        .stat-label {
            color: #8a9aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(80, 200, 170, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(80, 200, 170, 0.5);
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-text">Initializing Molecular Viewer...</div>
    </div>

    <div id="canvas-container"></div>

    <div class="ui-panel control-panel">
        <h2>Molecule Controls</h2>
        
        <div class="control-group">
            <label>Select Molecule</label>
            <select id="molecule-select">
                <option value="water">Water (H2O)</option>
                <option value="benzene">Benzene (C6H6)</option>
                <option value="bdna">B-DNA Double Helix</option>
                <option value="adna">A-DNA Double Helix</option>
                <option value="zdna">Z-DNA Double Helix</option>
                <option value="mrna">Messenger RNA (mRNA)</option>
                <option value="trna">Transfer RNA (tRNA)</option>
                <option value="rrna">Ribosomal RNA (rRNA)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Display Mode</label>
            <div class="btn-group">
                <button id="btn-ballstick" class="active">Ball and Stick</button>
                <button id="btn-spacefill">Space Filling</button>
            </div>
        </div>

        <div class="control-group">
            <label>Rotation</label>
            <div class="btn-group">
                <button id="btn-autorotate">Auto Rotate</button>
                <button id="btn-reset">Reset View</button>
            </div>
        </div>
    </div>

    <div class="ui-panel info-panel">
        <h2>Molecule Information</h2>
        <div class="molecule-info" id="molecule-desc">
            <p>Select a molecule to view its structure and information.</p>
        </div>
        <div class="stats" id="molecule-stats">
            <div class="stat-item">
                <div class="stat-value" id="atom-count">0</div>
                <div class="stat-label">Atoms</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bond-count">0</div>
                <div class="stat-label">Bonds</div>
            </div>
        </div>
        <div id="selected-info"></div>
    </div>

    <div class="ui-panel legend-panel">
        <h3>Atom Colors</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffffff;"></div>
            <span>Hydrogen (H)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #404040;"></div>
            <span>Carbon (C)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #3050f8;"></div>
            <span>Nitrogen (N)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff0d0d;"></div>
            <span>Oxygen (O)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff8000;"></div>
            <span>Phosphorus (P)</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Atom properties
        const atomProps = {
            H: { color: 0xffffff, radius: 0.31, vdwRadius: 1.2, name: 'Hydrogen', symbol: 'H' },
            C: { color: 0x404040, radius: 0.77, vdwRadius: 1.7, name: 'Carbon', symbol: 'C' },
            N: { color: 0x3050f8, radius: 0.75, vdwRadius: 1.55, name: 'Nitrogen', symbol: 'N' },
            O: { color: 0xff0d0d, radius: 0.73, vdwRadius: 1.52, name: 'Oxygen', symbol: 'O' },
            P: { color: 0xff8000, radius: 1.07, vdwRadius: 1.8, name: 'Phosphorus', symbol: 'P' }
        };

        const bondTypes = {
            single: { order: 1, color: 0x888888 },
            double: { order: 2, color: 0x666666 },
            triple: { order: 3, color: 0x444444 },
            aromatic: { order: 1.5, color: 0x777777 }
        };

        // Molecular data
        const molecules = {
            water: {
                name: 'Water (H2O)',
                description: 'Water is a simple molecule consisting of two hydrogen atoms covalently bonded to a single oxygen atom. The H-O-H bond angle is approximately 104.5 degrees, giving water its bent molecular geometry. This polar nature makes water an excellent solvent.',
                atoms: [
                    { type: 'O', position: [0, 0, 0] },
                    { type: 'H', position: [0.96, 0, 0] },
                    { type: 'H', position: [-0.24, 0.93, 0] }
                ],
                bonds: [
                    { start: 0, end: 1, type: 'single' },
                    { start: 0, end: 2, type: 'single' }
                ]
            },
            benzene: {
                name: 'Benzene (C6H6)',
                description: 'Benzene is an aromatic hydrocarbon with a hexagonal ring of six carbon atoms, each bonded to one hydrogen atom. The carbon-carbon bonds are delocalized, giving benzene its unique stability. All C-C bonds are equivalent with bond order of 1.5.',
                atoms: [],
                bonds: []
            },
            bdna: {
                name: 'B-DNA Double Helix',
                description: 'B-DNA is the most common form of DNA under physiological conditions. It features a right-handed helix with approximately 10.5 base pairs per turn. The major and minor grooves are well-defined, and the base pairs are nearly perpendicular to the helix axis.',
                atoms: [],
                bonds: []
            },
            adna: {
                name: 'A-DNA Double Helix',
                description: 'A-DNA is a right-handed helical form that occurs under dehydrating conditions. It has about 11 base pairs per turn and a wider, shallower major groove compared to B-DNA. The base pairs are tilted relative to the helix axis.',
                atoms: [],
                bonds: []
            },
            zdna: {
                name: 'Z-DNA Double Helix',
                description: 'Z-DNA is a left-handed helical form of DNA with a zigzag backbone pattern. It has about 12 base pairs per turn and forms under high salt concentrations or with certain sequence motifs like alternating purine-pyrimidine sequences.',
                atoms: [],
                bonds: []
            },
            mrna: {
                name: 'Messenger RNA (mRNA)',
                description: 'mRNA carries genetic information from DNA to ribosomes for protein synthesis. It is single-stranded with a 5 cap and 3 poly-A tail. This simplified model shows the helical secondary structure with ribose-phosphate backbone.',
                atoms: [],
                bonds: []
            },
            trna: {
                name: 'Transfer RNA (tRNA)',
                description: 'tRNA has a characteristic cloverleaf secondary structure that folds into an L-shaped tertiary structure. It carries amino acids to ribosomes during translation. The anticodon loop recognizes mRNA codons.',
                atoms: [],
                bonds: []
            },
            rrna: {
                name: 'Ribosomal RNA (rRNA)',
                description: 'rRNA forms the core of ribosome structure and catalyzes protein synthesis. It makes up about 80% of cellular RNA. This simplified model represents the complex folded domains of ribosomal RNA.',
                atoms: [],
                bonds: []
            }
        };

        // Generate benzene structure
        function generateBenzene() {
            const atoms = [];
            const bonds = [];
            const radius = 1.4;
            
            // Carbon ring
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                atoms.push({
                    type: 'C',
                    position: [Math.cos(angle) * radius, Math.sin(angle) * radius, 0]
                });
            }
            
            // Hydrogen atoms
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                atoms.push({
                    type: 'H',
                    position: [Math.cos(angle) * (radius + 1.1), Math.sin(angle) * (radius + 1.1), 0]
                });
            }
            
            // C-C bonds (aromatic)
            for (let i = 0; i < 6; i++) {
                bonds.push({ start: i, end: (i + 1) % 6, type: 'aromatic' });
            }
            
            // C-H bonds
            for (let i = 0; i < 6; i++) {
                bonds.push({ start: i, end: i + 6, type: 'single' });
            }
            
            return { atoms, bonds };
        }

        // Generate DNA structures
        function generateDNA(type) {
            const atoms = [];
            const bonds = [];
            const basePairs = type === 'adna' ? 8 : 10;
            const rise = type === 'adna' ? 0.26 : (type === 'zdna' ? 0.37 : 0.34);
            const twist = type === 'adna' ? 33 : (type === 'zdna' ? -30 : 36);
            const radius = type === 'adna' ? 1.2 : (type === 'zdna' ? 0.9 : 1.0);
            
            for (let i = 0; i < basePairs; i++) {
                const angle = (i * twist) * Math.PI / 180;
                const y = i * rise - (basePairs * rise / 2);
                
                // Strand 1
                const x1 = Math.cos(angle) * radius;
                const z1 = Math.sin(angle) * radius;
                
                // Strand 2 (opposite)
                const x2 = Math.cos(angle + Math.PI) * radius;
                const z2 = Math.sin(angle + Math.PI) * radius;
                
                // Phosphate backbone
                atoms.push({ type: 'P', position: [x1, y, z1] });
                atoms.push({ type: 'P', position: [x2, y, z2] });
                
                // Sugar groups (simplified as carbon)
                atoms.push({ type: 'C', position: [x1 * 0.6, y, z1 * 0.6] });
                atoms.push({ type: 'C', position: [x2 * 0.6, y, z2 * 0.6] });
                
                // Nitrogenous bases
                atoms.push({ type: 'N', position: [x1 * 0.3, y, z1 * 0.3] });
                atoms.push({ type: 'N', position: [x2 * 0.3, y, z2 * 0.3] });
                
                // Oxygen atoms
                atoms.push({ type: 'O', position: [x1 * 1.2, y + 0.1, z1 * 1.2] });
                atoms.push({ type: 'O', position: [x2 * 1.2, y - 0.1, z2 * 1.2] });
                
                const baseIdx = i * 8;
                
                // Backbone bonds
                bonds.push({ start: baseIdx, end: baseIdx + 2, type: 'single' });
                bonds.push({ start: baseIdx + 1, end: baseIdx + 3, type: 'single' });
                bonds.push({ start: baseIdx + 2, end: baseIdx + 4, type: 'single' });
                bonds.push({ start: baseIdx + 3, end: baseIdx + 5, type: 'single' });
                bonds.push({ start: baseIdx, end: baseIdx + 6, type: 'double' });
                bonds.push({ start: baseIdx + 1, end: baseIdx + 7, type: 'double' });
                
                // Base pairing
                bonds.push({ start: baseIdx + 4, end: baseIdx + 5, type: 'double' });
                
                // Vertical backbone connections
                if (i > 0) {
                    bonds.push({ start: baseIdx, end: baseIdx - 8, type: 'single' });
                    bonds.push({ start: baseIdx + 1, end: baseIdx - 7, type: 'single' });
                }
            }
            
            return { atoms, bonds };
        }

        // Generate RNA structures
        function generateRNA(type) {
            const atoms = [];
            const bonds = [];
            
            if (type === 'mrna') {
                // Single helix strand
                const length = 15;
                for (let i = 0; i < length; i++) {
                    const angle = i * 30 * Math.PI / 180;
                    const y = i * 0.35 - (length * 0.35 / 2);
                    const radius = 1.0;
                    
                    atoms.push({ type: 'P', position: [Math.cos(angle) * radius, y, Math.sin(angle) * radius] });
                    atoms.push({ type: 'C', position: [Math.cos(angle) * 0.6, y, Math.sin(angle) * 0.6] });
                    atoms.push({ type: 'N', position: [Math.cos(angle) * 0.2, y, Math.sin(angle) * 0.2] });
                    atoms.push({ type: 'O', position: [Math.cos(angle) * 1.2, y, Math.sin(angle) * 1.2] });
                    
                    const baseIdx = i * 4;
                    bonds.push({ start: baseIdx, end: baseIdx + 1, type: 'single' });
                    bonds.push({ start: baseIdx + 1, end: baseIdx + 2, type: 'single' });
                    bonds.push({ start: baseIdx, end: baseIdx + 3, type: 'double' });
                    
                    if (i > 0) {
                        bonds.push({ start: baseIdx, end: baseIdx - 4, type: 'single' });
                    }
                }
            } else if (type === 'trna') {
                // L-shaped structure
                const stem1Length = 6;
                const stem2Length = 6;
                const armLength = 4;
                
                // Vertical stem
                for (let i = 0; i < stem1Length; i++) {
                    const y = i * 0.5 - 1;
                    atoms.push({ type: 'P', position: [-0.8, y, 0] });
                    atoms.push({ type: 'P', position: [0.8, y, 0] });
                    atoms.push({ type: 'N', position: [-0.3, y, 0] });
                    atoms.push({ type: 'N', position: [0.3, y, 0] });
                    
                    const idx = i * 4;
                    bonds.push({ start: idx + 2, end: idx + 3, type: 'double' });
                    if (i > 0) {
                        bonds.push({ start: idx, end: idx - 4, type: 'single' });
                        bonds.push({ start: idx + 1, end: idx - 3, type: 'single' });
                    }
                }
                
                // Horizontal arm
                for (let i = 0; i < armLength; i++) {
                    const x = i * 0.5 + 1.5;
                    atoms.push({ type: 'P', position: [x, 1.5, 0] });
                    atoms.push({ type: 'N', position: [x, 2, 0] });
                }
                
                // Another arm
                for (let i = 0; i < armLength; i++) {
                    const x = -i * 0.5 - 1.5;
                    atoms.push({ type: 'P', position: [x, 1.5, 0] });
                    atoms.push({ type: 'N', position: [x, 2, 0] });
                }
                
            } else if (type === 'rrna') {
                // Complex folded structure
                const domains = 4;
                const atomsPerDomain = 8;
                
                for (let d = 0; d < domains; d++) {
                    const domainAngle = (d / domains) * Math.PI * 2;
                    const domainCenter = [Math.cos(domainAngle) * 2, Math.sin(domainAngle) * 2, 0];
                    
                    for (let i = 0; i < atomsPerDomain; i++) {
                        const angle = (i / atomsPerDomain) * Math.PI * 2;
                        const r = 0.8;
                        atoms.push({ 
                            type: i % 3 === 0 ? 'P' : (i % 3 === 1 ? 'C' : 'N'),
                            position: [
                                domainCenter[0] + Math.cos(angle) * r,
                                domainCenter[1] + Math.sin(angle) * r,
                                domainCenter[2] + (Math.random() - 0.5) * 0.5
                            ]
                        });
                    }
                }
                
                // Connect atoms within and between domains
                for (let i = 0; i < atoms.length; i++) {
                    if (i > 0) {
                        bonds.push({ start: i, end: i - 1, type: 'single' });
                    }
                }
            }
            
            return { atoms, bonds };
        }

        // Initialize all molecular data
        const benzeneData = generateBenzene();
        molecules.benzene.atoms = benzeneData.atoms;
        molecules.benzene.bonds = benzeneData.bonds;

        const bdnaData = generateDNA('bdna');
        molecules.bdna.atoms = bdnaData.atoms;
        molecules.bdna.bonds = bdnaData.bonds;

        const adnaData = generateDNA('adna');
        molecules.adna.atoms = adnaData.atoms;
        molecules.adna.bonds = adnaData.bonds;

        const zdnaData = generateDNA('zdna');
        molecules.zdna.atoms = zdnaData.atoms;
        molecules.zdna.bonds = zdnaData.bonds;

        const mrnaData = generateRNA('mrna');
        molecules.mrna.atoms = mrnaData.atoms;
        molecules.mrna.bonds = mrnaData.bonds;

        const trnaData = generateRNA('trna');
        molecules.trna.atoms = trnaData.atoms;
        molecules.trna.bonds = trnaData.bonds;

        const rrnaData = generateRNA('rrna');
        molecules.rrna.atoms = rrnaData.atoms;
        molecules.rrna.bonds = rrnaData.bonds;

        // Three.js setup
        let scene, camera, renderer, controls;
        let moleculeGroup, atomMeshes = [];
        let bondMeshes = [];
        let currentMolecule = 'water';
        let displayMode = 'ballstick';
        let autoRotate = false;
        let highlightedAtom = null;
        let originalMaterials = new Map();

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e14);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 50;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 10);
            scene.add(directionalLight);

            const directionalLight2 = new THREE.DirectionalLight(0x50c8aa, 0.3);
            directionalLight2.position.set(-10, -10, -10);
            scene.add(directionalLight2);

            // Add subtle particle background
            addParticleBackground();

            // Molecule group
            moleculeGroup = new THREE.Group();
            scene.add(moleculeGroup);

            // Build initial molecule
            buildMolecule(currentMolecule);

            // Event listeners
            setupEventListeners();

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 500);

            // Start animation
            animate();
        }

        function addParticleBackground() {
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;

                colors[i * 3] = 0.3 + Math.random() * 0.2;
                colors[i * 3 + 1] = 0.6 + Math.random() * 0.2;
                colors[i * 3 + 2] = 0.5 + Math.random() * 0.2;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function buildMolecule(moleculeId) {
            // Clear existing
            while (moleculeGroup.children.length > 0) {
                const child = moleculeGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
                moleculeGroup.remove(child);
            }
            atomMeshes = [];
            bondMeshes = [];
            originalMaterials.clear();
            highlightedAtom = null;

            const mol = molecules[moleculeId];
            if (!mol || !mol.atoms || mol.atoms.length === 0) return;

            // Calculate center of mass
            let centerX = 0, centerY = 0, centerZ = 0;
            mol.atoms.forEach(atom => {
                centerX += atom.position[0];
                centerY += atom.position[1];
                centerZ += atom.position[2];
            });
            centerX /= mol.atoms.length;
            centerY /= mol.atoms.length;
            centerZ /= mol.atoms.length;

            // Scale factor for visibility
            const scale = displayMode === 'ballstick' ? 1.5 : 0.8;

            // Create atoms
            mol.atoms.forEach((atom, index) => {
                const props = atomProps[atom.type];
                const radius = displayMode === 'ballstick' ? props.radius * scale * 0.5 : props.vdwRadius * scale;
                
                const geometry = new THREE.SphereGeometry(radius, 32, 32);
                const material = new THREE.MeshPhongMaterial({
                    color: props.color,
                    shininess: 100,
                    specular: 0x444444
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(
                    (atom.position[0] - centerX) * scale,
                    (atom.position[1] - centerY) * scale,
                    (atom.position[2] - centerZ) * scale
                );
                mesh.userData = {
                    atomIndex: index,
                    atomType: atom.type,
                    atomProps: props,
                    bonds: []
                };

                // Find bonds for this atom
                mol.bonds.forEach(bond => {
                    if (bond.start === index || bond.end === index) {
                        mesh.userData.bonds.push(bond);
                    }
                });

                moleculeGroup.add(mesh);
                atomMeshes.push(mesh);
                originalMaterials.set(mesh, material);
            });

            // Create bonds (only in ball-stick mode)
            if (displayMode === 'ballstick' && mol.bonds) {
                mol.bonds.forEach((bond, index) => {
                    const startAtom = mol.atoms[bond.start];
                    const endAtom = mol.atoms[bond.end];
                    const bondType = bondTypes[bond.type] || bondTypes.single;

                    const start = new THREE.Vector3(
                        (startAtom.position[0] - centerX) * scale,
                        (startAtom.position[1] - centerY) * scale,
                        (startAtom.position[2] - centerZ) * scale
                    );
                    const end = new THREE.Vector3(
                        (endAtom.position[0] - centerX) * scale,
                        (endAtom.position[1] - centerY) * scale,
                        (endAtom.position[2] - centerZ) * scale
                    );

                    const direction = new THREE.Vector3().subVectors(end, start);
                    const length = direction.length();
                    const bondRadius = 0.08;

                    const geometry = new THREE.CylinderGeometry(bondRadius, bondRadius, length, 16);
                    const material = new THREE.MeshPhongMaterial({
                        color: bondType.color,
                        shininess: 50
                    });

                    const cylinder = new THREE.Mesh(geometry, material);
                    cylinder.position.copy(start).add(end).multiplyScalar(0.5);
                    cylinder.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 1, 0),
                        direction.normalize()
                    );

                    cylinder.userData = {
                        bondIndex: index,
                        bondType: bond.type,
                        startAtom: bond.start,
                        endAtom: bond.end
                    };

                    moleculeGroup.add(cylinder);
                    bondMeshes.push(cylinder);
                });
            }

            // Update UI
            document.getElementById('atom-count').textContent = mol.atoms.length;
            document.getElementById('bond-count').textContent = mol.bonds ? mol.bonds.length : 0;
            document.getElementById('molecule-desc').innerHTML = `<p><strong>${mol.name}</strong></p><p>${mol.description}</p>`;
            document.getElementById('selected-info').innerHTML = '';
        }

        function highlightAtom(mesh) {
            // Reset previous highlight
            if (highlightedAtom && originalMaterials.has(highlightedAtom)) {
                highlightedAtom.material = originalMaterials.get(highlightedAtom);
            }

            if (mesh) {
                highlightedAtom = mesh;
                const highlightMaterial = new THREE.MeshPhongMaterial({
                    color: 0x50c8aa,
                    emissive: 0x50c8aa,
                    emissiveIntensity: 0.3,
                    shininess: 150
                });
                mesh.material = highlightMaterial;

                // Show atom info
                const userData = mesh.userData;
                let bondInfo = '';
                if (userData.bonds.length > 0) {
                    bondInfo = '<div class="bond-list">';
                    userData.bonds.forEach(bond => {
                        const bondType = bond.type.charAt(0).toUpperCase() + bond.type.slice(1);
                        bondInfo += `<div class="bond-item"><span>Bond</span><span class="bond-type">${bondType}</span></div>`;
                    });
                    bondInfo += '</div>';
                }

                document.getElementById('selected-info').innerHTML = `
                    <div class="atom-info">
                        <h3>Selected Atom</h3>
                        <p><strong>${userData.atomProps.name}</strong> (${userData.atomProps.symbol})</p>
                        <p>Bonds: ${userData.bonds.length}</p>
                        ${bondInfo}
                    </div>
                `;
            } else {
                highlightedAtom = null;
                document.getElementById('selected-info').innerHTML = '';
            }
        }

        function setupEventListeners() {
            // Molecule select
            document.getElementById('molecule-select').addEventListener('change', (e) => {
                currentMolecule = e.target.value;
                buildMolecule(currentMolecule);
            });

            // Display mode buttons
            document.getElementById('btn-ballstick').addEventListener('click', () => {
                displayMode = 'ballstick';
                document.getElementById('btn-ballstick').classList.add('active');
                document.getElementById('btn-spacefill').classList.remove('active');
                buildMolecule(currentMolecule);
            });

            document.getElementById('btn-spacefill').addEventListener('click', () => {
                displayMode = 'spacefill';
                document.getElementById('btn-spacefill').classList.add('active');
                document.getElementById('btn-ballstick').classList.remove('active');
                buildMolecule(currentMolecule);
            });

            // Auto rotate
            document.getElementById('btn-autorotate').addEventListener('click', (e) => {
                autoRotate = !autoRotate;
                e.target.classList.toggle('active', autoRotate);
            });

            // Reset view
            document.getElementById('btn-reset').addEventListener('click', () => {
                camera.position.set(0, 0, 15);
                controls.reset();
                moleculeGroup.rotation.set(0, 0, 0);
            });

            // Mouse interaction
            renderer.domElement.addEventListener('click', onMouseClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);

            // Window resize
            window.addEventListener('resize', onWindowResize);
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(atomMeshes);

            if (intersects.length > 0) {
                if (highlightedAtom === intersects[0].object) {
                    highlightAtom(null);
                } else {
                    highlightAtom(intersects[0].object);
                }
            } else {
                highlightAtom(null);
            }
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(atomMeshes);

            document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (autoRotate) {
                moleculeGroup.rotation.y += 0.005;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        init();
    </script>
</body>
</html>
