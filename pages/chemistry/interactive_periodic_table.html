<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Периодическая таблица элементов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Unbounded:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --accent: #00d4ff;
    --accent2: #ff6b35;

    --alkali: #ff4757;
    --alkali-earth: #ff6348;
    --transition: #ffa502;
    --post-transition: #7bed9f;
    --metalloid: #70a1ff;
    --nonmetal: #eccc68;
    --halogen: #a29bfe;
    --noble: #fd79a8;
    --lanthanide: #00cec9;
    --actinide: #6c5ce7;
    --unknown: #636e72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    /* -webkit-background-clip: text; */
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    flex: 1;
    max-width: 300px;
  }

  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .search-icon { color: var(--text-dim); font-size: 14px; }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .tab:hover:not(.active) { color: var(--text); background: var(--border); }

  /* PROPERTY SELECTOR */
  .property-bar {
    display: flex;
    gap: 6px;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-wrap: wrap;
  }

  .prop-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .prop-btn.active, .prop-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  /* TABLE */
  .table-container {
    padding: 20px 16px;
    overflow-x: auto;
  }

  .periodic-table {
    display: grid;
    grid-template-columns: repeat(18, minmax(54px, 64px));
    grid-template-rows: repeat(10, minmax(54px, 64px));
    gap: 3px;
    width: fit-content;
    margin: 0 auto;
  }

  /* ELEMENT CELL */
  .element {
    position: relative;
    border-radius: 6px;
    padding: 4px 5px;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    user-select: none;
  }

  .element::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.15;
    border-radius: inherit;
    transition: opacity 0.2s;
  }

  .element:hover {
    transform: scale(1.12);
    z-index: 10;
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .element:hover::before { opacity: 0.35; }

  .element.highlighted { transform: scale(1.05); z-index: 5; }
  .element.dimmed { opacity: 0.15; filter: grayscale(0.5); }

  .el-number {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    line-height: 1;
  }

  .el-symbol {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    text-align: center;
    margin: 2px 0;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .el-name {
    font-size: 8px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .el-mass {
    font-size: 8px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    line-height: 1;
  }

  /* Category colors */
  .cat-alkali::before { background: var(--alkali); }
  .cat-alkali { border-color: rgba(255,71,87,0.3); }
  .cat-alkali-earth::before { background: var(--alkali-earth); }
  .cat-alkali-earth { border-color: rgba(255,99,72,0.3); }
  .cat-transition::before { background: var(--transition); }
  .cat-transition { border-color: rgba(255,165,2,0.3); }
  .cat-post-transition::before { background: var(--post-transition); }
  .cat-post-transition { border-color: rgba(123,237,159,0.3); }
  .cat-metalloid::before { background: var(--metalloid); }
  .cat-metalloid { border-color: rgba(112,161,255,0.3); }
  .cat-nonmetal::before { background: var(--nonmetal); }
  .cat-nonmetal { border-color: rgba(236,204,104,0.3); }
  .cat-halogen::before { background: var(--halogen); }
  .cat-halogen { border-color: rgba(162,155,254,0.3); }
  .cat-noble::before { background: var(--noble); }
  .cat-noble { border-color: rgba(253,121,168,0.3); }
  .cat-lanthanide::before { background: var(--lanthanide); }
  .cat-lanthanide { border-color: rgba(0,206,201,0.3); }
  .cat-actinide::before { background: var(--actinide); }
  .cat-actinide { border-color: rgba(108,92,231,0.3); }
  .cat-unknown::before { background: var(--unknown); }

  /* LEGEND */
  .legend {
    grid-column: 1 / 4;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    background: none;
    cursor: default;
    border: none;
  }

  .legend:hover { transform: none; box-shadow: none; }

  .legend-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* PERIOD/GROUP LABELS */
  .period-label, .group-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    cursor: default;
  }

  .period-label:hover, .group-label:hover { transform: none; }

  /* PLACEHOLDER */
  .placeholder {
    background: none;
    border: none;
    cursor: default;
  }
  .placeholder:hover { transform: none; box-shadow: none; }

  /* SEPARATOR ROW */
  .separator {
    grid-column: 1 / -1;
    height: 8px;
    background: none;
    border: none;
    cursor: default;
  }
  .separator:hover { transform: none; }

  /* PANEL */
  .detail-panel {
    position: fixed;
    right: -480px;
    top: 0;
    width: 460px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    overflow-y: auto;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
  }

  .detail-panel.open { right: 0; }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .panel-element-big {
    width: 100px;
    height: 110px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .panel-element-big::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.2;
  }

  .panel-number { font-size: 11px; color: rgba(255,255,255,0.5); position: absolute; top: 8px; left: 10px; }
  .panel-symbol { font-family: 'Unbounded', sans-serif; font-size: 42px; font-weight: 700; color: #fff; line-height: 1; }
  .panel-name-ru { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .panel-mass { font-size: 10px; color: rgba(255,255,255,0.5); }

  .panel-title-block { flex: 1; }
  .panel-name-big { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .panel-latin { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .panel-category-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    margin-top: 8px;
    font-weight: 500;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .close-btn:hover { border-color: var(--accent); color: var(--accent); }

  .panel-body { padding: 16px 24px; flex: 1; }

  .panel-tabs { display: flex; gap: 4px; margin-bottom: 16px; }

  .panel-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .panel-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .panel-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .panel-content { display: none; }
  .panel-content.active { display: block; }

  /* PROPERTIES GRID */
  .props-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .prop-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .prop-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .prop-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .prop-unit { font-size: 9px; color: var(--text-dim); }

  .prop-card.full { grid-column: 1 / -1; }

  /* ELECTRON CONFIG */
  .electron-config {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-top: 4px;
    word-break: break-all;
  }

  /* BOHR MODEL */
  .bohr-model {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
    position: relative;
  }

  .bohr-svg { overflow: visible; }

  /* ISOTOPES */
  .isotope-list { display: flex; flex-direction: column; gap: 6px; }

  .isotope-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }

  .isotope-symbol { font-weight: 600; color: var(--accent); }
  .isotope-info { color: var(--text-dim); font-size: 10px; }
  .stable-badge { background: rgba(0,206,201,0.15); color: var(--lanthanide); padding: 2px 8px; border-radius: 10px; font-size: 9px; }
  .unstable-badge { background: rgba(255,71,87,0.15); color: var(--alkali); padding: 2px 8px; border-radius: 10px; font-size: 9px; }

  /* SPECTRUM BAR */
  .spectrum-section { margin-top: 12px; }
  .spectrum-label { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .spectrum-bar {
    height: 24px;
    border-radius: 4px;
    background: linear-gradient(to right, #000, #ff0000 16%, #ff7f00 33%, #ffff00 50%, #00ff00 66%, #0000ff 83%, #8b00ff 100%);
    position: relative;
    overflow: hidden;
  }

  /* OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.active { opacity: 1; pointer-events: all; }

  /* PROPERTY DISPLAY COLORS */
  .prop-display .element .el-mass {
    display: none;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .periodic-table {
      grid-template-columns: repeat(18, minmax(40px, 50px));
      grid-template-rows: repeat(10, minmax(40px, 50px));
    }
    .el-symbol { font-size: 13px; }
    .el-name { font-size: 7px; }
    .el-number { font-size: 7px; }
    .el-mass { font-size: 7px; }
  }

  /* VALUE BAR for property mode */
  .val-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 0 0 0 5px;
    transition: width 0.3s;
  }

  /* TABLE INFO (period/group labels in corners) */
  .table-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 16px 0;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .tooltip.visible { opacity: 1; }
  .tooltip-symbol { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; }
  .tooltip-name { color: var(--text-dim); margin-top: 2px; }
  .tooltip-prop { color: var(--accent); margin-top: 4px; font-weight: 600; }

  /* SUMMARY STRIP */
  .summary-strip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 10px;
    color: var(--text-dim);
    z-index: 50;
    flex-wrap: wrap;
  }

  .summary-item span { color: var(--text); font-weight: 600; }

  /* PHASE BADGES */
  .phase-solid { color: #74b9ff; }
  .phase-liquid { color: #00cec9; }
  .phase-gas { color: #fdcb6e; }
  .phase-unknown-ph { color: var(--text-dim); }

  /* WIKI SECTION */
  .wiki-section { font-size: 12px; color: var(--text-dim); line-height: 1.7; }
  .wiki-section p { margin-bottom: 10px; }

  /* ANIMATED HIGHLIGHT */
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(0,212,255,0.15); }
  }

  .element.search-match {
    animation: pulse-border 1.5s infinite;
    border-color: var(--accent) !important;
    z-index: 5;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ЭЛЕМЕНТЫ</div>
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Поиск элемента, символа, Z...">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setView('table')" id="tab-table">Таблица</button>
    <button class="tab" onclick="setView('list')" id="tab-list">Список</button>
    <button class="tab" onclick="setView('properties')" id="tab-props">Свойства</button>
  </div>
</div>

<!-- PROPERTY BAR -->
<div class="property-bar" id="propertyBar">
  <button class="prop-btn active" onclick="setProperty('category')" id="prop-category">Категория</button>
  <button class="prop-btn" onclick="setProperty('mass')" id="prop-mass">Атомная масса</button>
  <button class="prop-btn" onclick="setProperty('density')" id="prop-density">Плотность</button>
  <button class="prop-btn" onclick="setProperty('melt')" id="prop-melt">Т. плавления</button>
  <button class="prop-btn" onclick="setProperty('boil')" id="prop-boil">Т. кипения</button>
  <button class="prop-btn" onclick="setProperty('electronegativity')" id="prop-electronegativity">Электроотрицат.</button>
  <button class="prop-btn" onclick="setProperty('ionization')" id="prop-ionization">1-я ионизация</button>
  <button class="prop-btn" onclick="setProperty('radius')" id="prop-radius">Атомный радиус</button>
  <button class="prop-btn" onclick="setProperty('electrons')" id="prop-electrons">Эл. конфигурация</button>
  <button class="prop-btn" onclick="setProperty('phase')" id="prop-phase">Фаза (25°C)</button>
  <button class="prop-btn" onclick="setProperty('oxidation')" id="prop-oxidation">Степ. окисления</button>
  <button class="prop-btn" onclick="setProperty('year')" id="prop-year">Год открытия</button>
</div>

<!-- TABLE INFO -->
<div class="table-info">
  <span>Группы →</span>
  <span>Периоды ↓</span>
</div>

<!-- TABLE VIEW -->
<div class="table-container" id="tableView">
  <div class="periodic-table" id="periodicTable"></div>
</div>

<!-- LIST VIEW -->
<div id="listView" style="display:none; padding:20px 24px;">
  <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px;" id="listContainer"></div>
</div>

<!-- PROPERTIES VIEW -->
<div id="propertiesView" style="display:none; padding:20px 24px;">
  <div id="propertiesChart"></div>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <div class="panel-element-big" id="panelBigElement">
      <div class="panel-number" id="panelNumber"></div>
      <div class="panel-symbol" id="panelSymbol"></div>
      <div class="panel-name-ru" id="panelNameRu"></div>
      <div class="panel-mass" id="panelMassHeader"></div>
    </div>
    <div class="panel-title-block">
      <div class="panel-name-big" id="panelNameBig"></div>
      <div class="panel-latin" id="panelLatin"></div>
      <div class="panel-category-badge" id="panelCategoryBadge"></div>
      <div style="margin-top:8px; font-size:11px; color:var(--text-dim)" id="panelPhase"></div>
      <div style="margin-top:4px; font-size:11px; color:var(--text-dim)" id="panelYear"></div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="panel-tabs">
      <button class="panel-tab active" onclick="setPanelTab('overview')">Обзор</button>
      <button class="panel-tab" onclick="setPanelTab('physical')">Физ. свойства</button>
      <button class="panel-tab" onclick="setPanelTab('atomic')">Атомные</button>
      <button class="panel-tab" onclick="setPanelTab('isotopes')">Изотопы</button>
    </div>
    <div class="panel-content active" id="tab-overview"></div>
    <div class="panel-content" id="tab-physical"></div>
    <div class="panel-content" id="tab-atomic"></div>
    <div class="panel-content" id="tab-isotopes"></div>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-symbol" id="tt-symbol"></div>
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-prop" id="tt-prop"></div>
</div>

<!-- SUMMARY STRIP -->
<div class="summary-strip">
  <div class="summary-item">Элементов: <span>118</span></div>
  <div class="summary-item">Металлов: <span>92</span></div>
  <div class="summary-item">Неметаллов: <span>17</span></div>
  <div class="summary-item">Синтетических: <span>24</span></div>
  <div class="summary-item" id="hoverInfo" style="color:var(--text-dim)">Наведите на элемент</div>
</div>

<script>
// ============================
// FULL ELEMENT DATA (118 elements)

const elements = [

// ============================
// LAYOUT MAPPING
// ============================
function getGridPosition(el) {
  const { group, period, z } = el;
  let row = period;
  let col = group;
  // Lanthanides row 8, actinides row 9
  if (el.cat === 'lanthanide') { row = 8; col = z - 57 + 4; }
  if (el.cat === 'actinide') { row = 9; col = z - 89 + 4; }
  return { row, col };
}

  'alkali': 'Щелочные металлы',

  'post-transition': 'Постпереходные металлы',
  'metalloid': 'Металлоиды',
  'nonmetal': 'Неметаллы',

  'unknown': 'Неизвестная категория',
};

// ============================
// BUILD TABLE
// ============================
function buildTable() {
  const table = document.getElementById('periodicTable');
  table.innerHTML = '';

  // Create 10 rows × 18 cols grid
  // Row 1-7 = periods 1-7, Row 8 = separator/lanthanide label, Row 9-10 = lanthanides/actinides
  const cells = {};
  // Initialize empty cells
  for (let r = 1; r <= 10; r++) {
    for (let c = 1; c <= 18; c++) {
      cells[`${r}-${c}`] = null;
    }
  }

  // Place elements
  elements.forEach(el => {
    const pos = getGridPosition(el);
    cells[`${pos.row}-${pos.col}`] = el;
  });

  // Build grid items
  for (let r = 1; r <= 10; r++) {
    for (let c = 1; c <= 18; c++) {
      const el = cells[`${r}-${c}`];
      const div = document.createElement('div');

      if (r === 8 && c === 1) {
        // Separator row label
        div.className = 'element placeholder';
        div.style.gridRow = r;
        div.style.gridColumn = c;
        div.style.fontSize = '9px';
        div.style.color = 'var(--lanthanide)';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'center';
        div.style.borderTop = '1px dashed rgba(0,206,201,0.3)';
        div.style.gridColumn = '1 / 4';
        div.textContent = '57–71';
        table.appendChild(div);
        continue;
      }

      if (r === 9 && c === 1) {
        div.className = 'element placeholder';
        div.style.gridRow = r;
        div.style.gridColumn = '1 / 4';
        div.style.fontSize = '9px';
        div.style.color = 'var(--actinide)';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'center';
        div.textContent = '89–103';
        table.appendChild(div);
        continue;
      }

      if ((r === 8 || r === 9) && c < 4) continue;

      if (el) {
        div.className = `element cat-${el.cat}`;
        div.style.gridRow = r;
        div.style.gridColumn = c;
        div.dataset.z = el.z;
        div.innerHTML = `
          <div class="el-number">${el.z}</div>
          <div class="el-symbol">${el.symbol}</div>
          <div class="el-name">${el.name}</div>
          <div class="el-mass" id="el-mass-${el.z}">${el.mass}</div>
        `;
        div.addEventListener('click', () => openPanel(el));
        div.addEventListener('mouseenter', (e) => showTooltip(e, el));
        div.addEventListener('mouseleave', hideTooltip);
        div.id = `el-${el.z}`;
      } else {
        div.className = 'element placeholder';
        div.style.gridRow = r;
        div.style.gridColumn = c;
        div.style.background = 'none';
        div.style.border = 'none';
      }
      table.appendChild(div);
    }
  }

  updatePropertyDisplay();
}

// ============================
// PROPERTY DISPLAY
// ============================
function setProperty(prop) {
  currentProperty = prop;
  document.querySelectorAll('.prop-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('prop-' + prop).classList.add('active');
  updatePropertyDisplay();
}

function getPropertyValue(el, prop) {
  switch(prop) {
    case 'mass': return el.mass;
    case 'density': return el.density;
    case 'melt': return el.melt;
    case 'boil': return el.boil;
    case 'electronegativity': return el.en;
    case 'ionization': return el.ie1;
    case 'radius': return el.radius;
    case 'year': return el.year;
    case 'electrons': return el.shells ? el.shells.reduce((a,b)=>a+b,0) : null;
    default: return null;
  }
}

function updatePropertyDisplay() {
  const prop = currentProperty;
  
  // Collect all values for scaling
  let values = [];
  if (prop !== 'category' && prop !== 'phase' && prop !== 'oxidation' && prop !== 'electrons') {
    elements.forEach(el => {
      const v = getPropertyValue(el, prop);
      if (v !== null && v !== undefined) values.push(v);
    });
  }
  const min = Math.min(...values);
  const max = Math.max(...values);

  elements.forEach(el => {
    const div = document.getElementById(`el-${el.z}`);
    if (!div) return;

    // Remove old val bars
    const oldBar = div.querySelector('.val-bar');
    if (oldBar) oldBar.remove();

    const massEl = document.getElementById(`el-mass-${el.z}`);

    if (prop === 'category') {
      div.style.background = '';
      div.style.borderColor = '';
      if (massEl) massEl.textContent = el.mass;
    } else if (prop === 'phase') {
      const phaseColors = { solid: '#74b9ff', liquid: '#00cec9', gas: '#fdcb6e', unknown: '#636e72' };
      const c = phaseColors[el.phase] || '#636e72';
      div.style.background = `${c}22`;
      div.style.borderColor = `${c}66`;
      if (massEl) {
        const phaseNames = { solid: 'Тв.', liquid: 'Жидк.', gas: 'Газ' };
        massEl.textContent = phaseNames[el.phase] || '?';
      }
    } else if (prop === 'oxidation') {
      if (massEl && el.ox) massEl.textContent = el.ox.join(',');
      div.style.background = '';
    } else if (prop === 'electrons') {
      const shells = el.shells || [];
      if (massEl) massEl.textContent = shells.join('-');
      div.style.background = '';
    } else {
      const v = getPropertyValue(el, prop);
      if (v !== null && v !== undefined) {
        const ratio = max === min ? 0.5 : (v - min) / (max - min);
        const r = Math.round(255 * (1-ratio));
        const g = Math.round(200 * ratio);
        const b = Math.round(150 * ratio);
        div.style.background = `rgba(${r},${g},${b},0.25)`;
        div.style.borderColor = `rgba(${r},${g},${b},0.5)`;
        
        const bar = document.createElement('div');
        bar.className = 'val-bar';
        bar.style.width = `${ratio * 100}%`;
        bar.style.background = `rgb(${r},${g},${b})`;
        div.appendChild(bar);

        const units = { mass:'а.е.м.', density:'г/см³', melt:'°C', boil:'°C', electronegativity:'', ionization:'кДж/моль', radius:'пм', year:'г.' };
        if (massEl) massEl.textContent = v + (units[prop] ? '' : '');
      } else {
        div.style.background = '#1a1a24';
        div.style.borderColor = '#2a2a3a';
        if (massEl) massEl.textContent = '—';
      }
    }
  });
}

// ============================
// SEARCH
// ============================
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  elements.forEach(el => {
    const div = document.getElementById(`el-${el.z}`);
    if (!div || div.classList.contains('placeholder')) return;
    if (!q) {
      div.classList.remove('search-match', 'dimmed');
      return;
    }
    const match = el.symbol.toLowerCase().includes(q) || 
                  el.name.toLowerCase().includes(q) || 
                  el.latin.toLowerCase().includes(q) ||
                  String(el.z) === q;
    if (match) {
      div.classList.add('search-match');
      div.classList.remove('dimmed');
    } else {
      div.classList.remove('search-match');
      div.classList.add('dimmed');
    }
  });
  document.getElementById('hoverInfo').textContent = q ? `Поиск: "${q}"` : 'Наведите на элемент';
});

// ============================
// TOOLTIP
// ============================
function showTooltip(e, el) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-symbol').textContent = el.symbol;
  document.getElementById('tt-name').textContent = `${el.z}. ${el.name} / ${el.latin}`;
  
  const prop = currentProperty;
  let propText = '';
  if (prop === 'category') propText = CAT_NAMES[el.cat];
  else if (prop === 'phase') propText = `Фаза: ${el.phase}`;
  else if (prop === 'mass') propText = `Масса: ${el.mass} а.е.м.`;
  else if (prop === 'density') propText = el.density ? `Плотность: ${el.density} г/см³` : 'Плотность: н/д';
  else if (prop === 'melt') propText = el.melt !== null ? `Тпл: ${el.melt}°C` : 'Тпл: н/д';
  else if (prop === 'boil') propText = el.boil !== null ? `Ткип: ${el.boil}°C` : 'Ткип: н/д';
  else if (prop === 'electronegativity') propText = el.en ? `Эл-отриц: ${el.en}` : 'Эл-отриц: —';
  else if (prop === 'ionization') propText = el.ie1 ? `1-я ион: ${el.ie1} кДж/моль` : '1-я ион: н/д';
  else if (prop === 'radius') propText = el.radius ? `Радиус: ${el.radius} пм` : 'Радиус: н/д';
  else if (prop === 'year') propText = el.year ? `Открыт: ${el.year}` : 'Известен с древности';
  
  document.getElementById('tt-prop').textContent = propText;
  tt.classList.add('visible');
  document.getElementById('hoverInfo').textContent = `${el.z} ${el.symbol} — ${el.name}`;
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
  document.getElementById('hoverInfo').textContent = 'Наведите на элемент';
}

document.addEventListener('mousemove', (e) => {
  const tt = document.getElementById('tooltip');
  if (tt.classList.contains('visible')) {
    let x = e.clientX + 16;
    let y = e.clientY + 16;
    if (x + 220 > window.innerWidth) x = e.clientX - 220;
    if (y + 100 > window.innerHeight) y = e.clientY - 100;
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
  }
});

function openPanel(el) {
  selectedElement = el;
  const color = CAT_COLORS[el.cat];
  
  // Header
  const bigEl = document.getElementById('panelBigElement');
  bigEl.style.background = `${color}22`;
  bigEl.style.borderColor = `${color}44`;
  bigEl.querySelector('.panel-number').textContent = el.z;
  bigEl.querySelector('.panel-symbol').textContent = el.symbol;
  bigEl.querySelector('.panel-name-ru').textContent = el.name;
  bigEl.querySelector('.panel-mass').textContent = el.mass;

  document.getElementById('panelNameBig').textContent = el.name;
  document.getElementById('panelLatin').textContent = el.latin;
  
  const badge = document.getElementById('panelCategoryBadge');
  badge.textContent = CAT_NAMES[el.cat];
  badge.style.background = `${color}22`;
  badge.style.color = color;
  badge.style.border = `1px solid ${color}44`;

  const phaseNames = { solid: '⬛ Твёрдое вещество', liquid: '💧 Жидкость', gas: '💨 Газ' };
  document.getElementById('panelPhase').textContent = `${phaseNames[el.phase] || '?'} при 25°C`;
  document.getElementById('panelYear').textContent = el.year ? `📅 Открыт: ${el.year} г. · ${el.discoverer}` : `📅 Известен с древности`;

  // Tabs content
  buildOverviewTab(el, color);
  buildPhysicalTab(el, color);
  buildAtomicTab(el, color);
  buildIsotopesTab(el, color);

  // Reset to first tab
  setPanelTab('overview');

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

function setPanelTab(tab) {
  currentPanelTab = tab;
  document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.panel-tab[onclick="setPanelTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

        <div class="electron-config">${el.config}</div>
        <div style="font-size:11px; color:var(--text-dim); margin-top:4px">Оболочки: ${el.shells ? el.shells.join(' · ') : '—'}</div>
      </div>
      ${el.ox ? `<div class="prop-card full">
        <div class="prop-label">Степени окисления</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
          ${el.ox.map(o=>`<span style="background:${color}22;color:${color};padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600">${o>0?'+'+o:o}</span>`).join('')}
        </div>
      </div>` : ''}
    </div>
  `;
}

function buildPhysicalTab(el, color) {
  const container = document.getElementById('tab-physical');
  const fmt = (v, unit, dec=2) => v !== null && v !== undefined ? `${typeof v === 'number' ? v.toFixed ? v : v : v} ${unit}` : '—';
  
  container.innerHTML = `
    <div class="props-grid">
      <div class="prop-card">
        <div class="prop-label">Плотность</div>
        <div class="prop-value">${el.density ? el.density : '—'} <span class="prop-unit">${el.density ? 'г/см³' : ''}</span></div>
      </div>
      <div class="prop-card">
        <div class="prop-label">Температура плавления</div>
        <div class="prop-value">${el.melt !== null && el.melt !== undefined ? el.melt + '°C' : '—'}</div>
        <div class="prop-unit">${el.melt !== null && el.melt !== undefined ? (el.melt + 273.15).toFixed(2) + ' K' : ''}</div>
      </div>
      <div class="prop-card">
        <div class="prop-label">Температура кипения</div>
        <div class="prop-value">${el.boil !== null && el.boil !== undefined ? el.boil + '°C' : '—'}</div>
        <div class="prop-unit">${el.boil !== null && el.boil !== undefined ? (el.boil + 273.15).toFixed(2) + ' K' : ''}</div>
      </div>
      <div class="prop-card">
        <div class="prop-label">Агрегатное состояние</div>
        <div class="prop-value phase-${el.phase}">${{solid:'Твёрдое',liquid:'Жидкость',gas:'Газ'}[el.phase] || '?'}</div>
      </div>
    </div>
    ${el.melt !== null && el.boil !== null && el.melt !== undefined && el.boil !== undefined ? `
    <div style="margin-top:16px;">
      <div class="prop-label" style="margin-bottom:8px">Диапазон жидкого состояния</div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:6px">
          <span>${el.melt}°C</span><span>→ жидкость →</span><span>${el.boil}°C</span>
        </div>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;background:linear-gradient(to right,${color},${color}88);width:100%;border-radius:4px;"></div>
        </div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:6px">Диапазон: ${(el.boil - el.melt).toFixed(1)}°C</div>
      </div>
    </div>` : ''}
  `;
}

function buildAtomicTab(el, color) {
  const container = document.getElementById('tab-atomic');
  
  // Bohr model SVG
  const shells = el.shells || [];
  const shellColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#00d2d3'];
  let svgContent = '';
  const cx = 110, cy = 110;
  
  // Nucleus
  const nucRadius = 12 + Math.min(el.z * 0.3, 15);
  svgContent += `<circle cx="${cx}" cy="${cy}" r="${nucRadius}" fill="${color}44" stroke="${color}" stroke-width="1.5"/>`;
  svgContent += `<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="${color}" font-weight="bold">${el.z}</text>`;
  
  shells.forEach((count, i) => {
    const r = nucRadius + 22 + i * 22;
    svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${shellColors[i%7]}33" stroke-width="1" stroke-dasharray="3 3"/>`;
    for (let j = 0; j < Math.min(count, 20); j++) {
      const angle = (j / count) * 2 * Math.PI - Math.PI/2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);
      svgContent += `<circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="3" fill="${shellColors[i%7]}" opacity="0.9"/>`;
    }
    if (count > 20) {
      svgContent += `<text x="${cx + r + 4}" y="${cy}" font-size="8" fill="${shellColors[i%7]}" opacity="0.7">+${count-20}</text>`;
    }
  });

  const svgSize = nucRadius + 22 + shells.length * 22 + 20;
  
  container.innerHTML = `
    <div style="display:flex;justify-content:center;margin-bottom:16px">
      <svg width="${svgSize*2}" height="${svgSize*2}" viewBox="0 0 ${svgSize*2} ${svgSize*2}" style="max-width:220px">
        <g transform="translate(${svgSize - cx}, ${svgSize - cy})">${svgContent}</g>
      </svg>
    </div>
    <div class="props-grid">
      <div class="prop-card">
        <div class="prop-label">Электроотрицательность</div>
        <div class="prop-value" style="color:${color}">${el.en || '—'}</div>
        <div class="prop-unit">по Полингу</div>
      </div>
      <div class="prop-card">
        <div class="prop-label">1-я ионизация</div>
        <div class="prop-value">${el.ie1 || '—'} <span class="prop-unit">${el.ie1 ? 'кДж/моль' : ''}</span></div>
      </div>
      <div class="prop-card">
        <div class="prop-label">Атомный радиус</div>
        <div class="prop-value">${el.radius || '—'} <span class="prop-unit">${el.radius ? 'пм' : ''}</span></div>
      </div>
      <div class="prop-card">
        <div class="prop-label">Электронов на оболочках</div>
        <div class="prop-value" style="font-size:12px">${shells.join(' | ')}</div>
      </div>
      <div class="prop-card full">
        <div class="prop-label">Конфигурация</div>
        <div class="electron-config">${el.config}</div>
      </div>
    </div>
  `;
}

function buildIsotopesTab(el, color) {
  const container = document.getElementById('tab-isotopes');
  const isotopes = el.isotopes || [];
  
  container.innerHTML = `
    <div class="isotope-list">
      ${isotopes.map(iso => `
        <div class="isotope-item">
          <div>
            <div class="isotope-symbol">${iso.sym} ${el.symbol}</div>
            <div class="isotope-info">${iso.abund ? `Распространённость: ${iso.abund}` : iso.t12 ? `T½: ${iso.t12}` : ''}</div>
          </div>
          <div>${iso.stab ? '<span class="stable-badge">стабильный</span>' : '<span class="unstable-badge">нестабильный</span>'}</div>
        </div>
      `).join('')}
      ${isotopes.length === 0 ? '<div style="color:var(--text-dim);font-size:12px;padding:16px">Данные недоступны</div>' : ''}
    </div>
    <div style="margin-top:16px; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px;">
      <div class="prop-label" style="margin-bottom:6px">Атомная масса</div>
      <div style="font-size:20px; font-weight:600; color:${color}">${el.mass}</div>
      <div style="font-size:10px; color:var(--text-dim); margin-top:4px">а.е.м. (среднее по изотопам)</div>
    </div>
  `;
}

// ============================
// VIEW SWITCHING
// ============================
function setView(view) {
  currentView = view;
  ['table','list','properties'].forEach(v => {
    document.getElementById(v+'View').style.display = 'none';
    document.getElementById('tab-'+v).classList.remove('active');
  });
  
  if (view === 'table') {
    document.getElementById('tableView').style.display = 'block';
  } else if (view === 'list') {
    document.getElementById('listView').style.display = 'block';
    buildListView();
  } else if (view === 'properties') {
    document.getElementById('propertiesView').style.display = 'block';
    buildPropertiesView();
  }
  
  document.getElementById('tab-'+view).classList.add('active');
}

function buildListView() {
  const container = document.getElementById('listContainer');
  const q = document.getElementById('searchInput').value.toLowerCase();
  container.innerHTML = '';
  
  elements.filter(el => !q || el.name.toLowerCase().includes(q) || el.symbol.toLowerCase().includes(q) || String(el.z) === q)
    .forEach(el => {
      const color = CAT_COLORS[el.cat];
      const div = document.createElement('div');
      div.style.cssText = `background:var(--surface2);border:1px solid ${color}33;border-radius:8px;padding:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px`;
      div.onmouseenter = () => div.style.borderColor = color;
      div.onmouseleave = () => div.style.borderColor = `${color}33`;
      div.onclick = () => openPanel(el);
      div.innerHTML = `
        <div style="width:44px;height:44px;border-radius:8px;background:${color}22;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:${color};flex-shrink:0">${el.symbol}</div>
        <div style="flex:1;overflow:hidden">
          <div style="font-size:12px;font-weight:600;color:var(--text)">${el.z}. ${el.name}</div>
          <div style="font-size:10px;color:var(--text-dim)">${el.latin}</div>
          <div style="font-size:10px;color:${color};margin-top:2px">${CAT_NAMES[el.cat]}</div>
        </div>
        <div style="text-align:right;font-size:10px;color:var(--text-dim)">${el.mass}<br><span style="color:${el.phase==='gas'?'#fdcb6e':el.phase==='liquid'?'#00cec9':'#74b9ff'}">${{solid:'тв.',liquid:'жидк.',gas:'газ'}[el.phase]||'?'}</span></div>
      `;
      container.appendChild(div);
    });
}

function buildPropertiesView() {
  const container = document.getElementById('propertiesChart');
  
  const props = [
    { key: 'en', label: 'Электроотрицательность (Полинг)', unit: '', color: '#a29bfe' },
    { key: 'ie1', label: 'Первая энергия ионизации', unit: 'кДж/моль', color: '#fd79a8' },
    { key: 'radius', label: 'Атомный радиус', unit: 'пм', color: '#00cec9' },
    { key: 'density', label: 'Плотность', unit: 'г/см³', color: '#ffa502' },
  ];
  
  container.innerHTML = props.map(prop => {
    const data = elements
      .filter(el => el[prop.key] !== null && el[prop.key] !== undefined && el.period <= 6)
      .sort((a,b) => a.z - b.z);
    
    if (!data.length) return '';
    
    const maxV = Math.max(...data.map(d => d[prop.key]));
    const barW = Math.max(4, Math.min(16, Math.floor(900 / data.length)));
    
    return `
      <div style="margin-bottom:32px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)">${prop.label}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:12px">Элементы периодов 1–6 · ${prop.unit}</div>
        <div style="display:flex;align-items:flex-end;gap:1px;height:120px;overflow-x:auto;padding-bottom:4px">
          ${data.map(el => `
            <div title="${el.symbol}: ${el[prop.key]} ${prop.unit}"
                 onclick="openPanel(elements.find(e=>e.z==${el.z}))"
                 style="flex-shrink:0;width:${barW}px;background:${prop.color};height:${Math.max(4, (el[prop.key]/maxV)*115)}px;
                        border-radius:2px 2px 0 0;cursor:pointer;transition:opacity 0.2s;opacity:0.8;position:relative"
                 onmouseenter="this.style.opacity=1;this.title=''"
                 onmouseleave="this.style.opacity=0.8">
            </div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-top:4px;overflow:hidden">
          <span>H</span>
          ${data.filter((_,i) => i % Math.ceil(data.length/10) === 0).map(el => `<span>${el.symbol}</span>`).join('')}
          <span>${data[data.length-1].symbol}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Init
buildTable();

// Make setPanelTab and openPanel globally accessible for panel content onclick handlers
window.elements = elements;
window.openPanel = openPanel;
</script>
