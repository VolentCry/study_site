<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Типы частиц</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050510;
    --card-bg: rgba(240,240,255,0.06);
    --card-hover: rgba(240,240,255,0.12);
    --text: #e8eaf6;
    --text-dim: #9fa8da;

    /* gradient pairs per group */
    --g1-a: #2E1065; --g1-b: #A78BFA;
    --g2-a: #064E3B; --g2-b: #6EE7B7;
    --g3-a: #78350F; --g3-b: #FCD34D;
    --g4-a: #1E3A8A; --g4-b: #93C5FD;
    --g5-a: #4C0519; --g5-b: #FDA4AF;
    --g6-a: #1A2E05; --g6-b: #BEF264;
    --g7-a: #450A0A; --g7-b: #F97316;
    --g8-a: #1E1B4B; --g8-b: #F472B6;
    --g9-a: #0C4A6E; --g9-b: #7DD3FC;
    --g10-a:#1E1B4B; --g10-b:#C084FC;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: grab;
    user-select: none;
  }

  body.dragging { cursor: grabbing; }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2.5px 2.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 90%, rgba(167,139,250,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 15%, rgba(110,231,183,0.3) 0%, transparent 100%),
      radial-gradient(3px 3px at 45% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(5px 5px at 65% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2.5px 2.5px at 55% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(3px 3px at 25% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2.5px 2.5px at 75% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* SVG canvas for edges */
  #edges-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  /* Canvas container (pannable) */
  #canvas {
    position: absolute;
    transform-origin: 0 0;
    z-index: 2;
  }

  /* ---- CARDS ---- */
  /* .node is the gradient-background wrapper (acts as border) */
  .node {
    position: absolute;
    border-radius: 12px;
    padding: 6.5px;
    font-size: 13px;
    line-height: 1.4;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
    cursor: pointer;
    display: flex;
    align-items: stretch;
    z-index: 2;
    background: linear-gradient(180deg, #334155, #94a3b8);
  }

  /* White inner layer */
  .node-inner {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px 10px;
    color: #240d35;
    border-radius: 9px;
    background: #d3d5dc94;
  }

  .node:hover {
    transform: translateY(-6px) scale(1.04);
    z-index: 10;
  }

  /* Group gradient backgrounds (visible as the border) */
  .node.g1  { background: linear-gradient(135deg, var(--g1-a),  var(--g1-b)); }
  .node.g2  { background: linear-gradient(135deg, var(--g2-a),  var(--g2-b)); }
  .node.g3  { background: linear-gradient(135deg, var(--g3-a),  var(--g3-b)); }
  .node.g4  { background: linear-gradient(135deg, var(--g4-a),  var(--g4-b)); }
  .node.g5  { background: linear-gradient(135deg, var(--g5-a),  var(--g5-b)); }
  .node.g6  { background: linear-gradient(135deg, var(--g6-a),  var(--g6-b)); }
  .node.g7  { background: linear-gradient(135deg, var(--g7-a),  var(--g7-b)); }
  .node.g8  { background: linear-gradient(135deg, var(--g8-a),  var(--g8-b)); }
  .node.g9  { background: linear-gradient(135deg, var(--g9-a),  var(--g9-b)); }
  .node.g10 { background: linear-gradient(135deg, var(--g10-a), var(--g10-b)); }

  /* Node type variants */
  .node.header .node-inner {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .node.title-main .node-inner {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    text-align: center;
  }

  .node.note .node-inner {
    font-size: 11px;
    text-align: left;
    line-height: 1.5;
    color: #2d2d4e;
  }

  .node.note:hover { 
    transform: none; 
  }

  /* Glow effect per group */
  .node.g1:hover { box-shadow: 0 10px 20px rgba(167,139,250,0.5); }
  .node.g2:hover { box-shadow: 0 10px 20px rgba(110,231,183,0.5); }
  .node.g3:hover { box-shadow: 0 10px 20px rgba(252,211,77,0.5); }
  .node.g4:hover { box-shadow: 0 10px 20px rgba(147,197,253,0.5); }
  .node.g5:hover { box-shadow: 0 10px 20px rgba(253,164,175,0.5); }
  .node.g6:hover { box-shadow: 0 10px 20px rgba(190,242,100,0.5); }
  .node.g7:hover { box-shadow: 0 10px 20px rgba(249,115,22,0.5); }
  .node.g8:hover { box-shadow: 0 10px 20px rgba(244,114,182,0.5); }
  .node.g9:hover { box-shadow: 0 10px 20px rgba(125,211,252,0.5); }
  .node.g10:hover { box-shadow: 0 10px 20px rgba(192,132,252,0.5); }

  /* ---- BACK BUTTON ---- */
  #back-btn {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 100;
    background: rgba(15,15,40,0.9);
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #A78BFA;
    cursor: pointer;
    letter-spacing: 1px;
    backdrop-filter: blur(10px);
    position: fixed;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: inset 0 0 0 2px #A78BFA, 0 4px 20px rgba(167,139,250,0.3);
  }

  #back-btn:hover {
    background: rgba(167,139,250,0.15);
    box-shadow: inset 0 0 0 2px #A78BFA, 0 8px 30px rgba(167,139,250,0.5);
    transform: translateX(-2px);
  }

  #back-btn svg { width:14px; height:14px; }

  /* ---- INFO MODAL ---- */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,5,0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.active { display: flex; }

  #modal {
    background: rgba(8,8,25,0.97);
    border-radius: 16px;
    padding: 36px 40px;
    max-width: 480px;
    width: 90%;
    position: relative;
    animation: modalIn 0.3s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes modalIn {
    from { opacity:0; transform: scale(0.85) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  #modal::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 18px;
    z-index: -1;
    background: linear-gradient(135deg, var(--modal-ca, #2E1065), var(--modal-cb, #A78BFA));
  }

  #modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    line-height: 1;
    transition: color 0.2s;
  }

  #modal-close:hover { color: #fff; }

  #modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 6px;
    background: linear-gradient(90deg, var(--modal-ca, #2E1065), var(--modal-cb, #A78BFA));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #modal-type {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  #modal-body {
    font-size: 14px;
    line-height: 1.7;
    color: #c5cae9;
  }

  #modal-body .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin: 2px 3px 2px 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* hint */
  #hint {
    position: fixed;
    bottom: 20px; right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
    pointer-events: none;
    text-align: right;
    z-index: 50;
  }
</style>
</head>
<body>

<a id="back-btn" href="javascript:history.back()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

<svg id="edges-svg"></svg>
<div id="canvas"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-title"></div>
    <div id="modal-type"></div>
    <div id="modal-body"></div>
  </div>
</div>

// Clean text from HTML/markdown for lookup
function cleanText(raw) {
  return raw
    .replace(/<[^>]+>/g, '')
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/#+ /g, '')
    .replace(/<center>|<\/center>/gi, '')
    .replace(/\$\\[A-Za-z]+\$/g, '')
    .replace(/\\\(/g,'').replace(/\\\)/g,'')
    .trim();
}

// Edge color map
const edgeColorMap = {
  '1': '#FDA4AF',
  '2': '#FCD34D',
  '3': '#FCD34D',
  '4': '#6EE7B7',
  '5': '#7DD3FC',
  '6': '#C084FC',
};

// ============================================================
// BUILD DOM
// ============================================================
const canvas = document.getElementById('canvas');
const svg = document.getElementById('edges-svg');

// Build node map for edge rendering
const nodeMap = {};
rawNodes.forEach(n => { nodeMap[n.id] = n; });

// Create node elements
rawNodes.forEach(n => {
  const el = document.createElement('div');
  el.className = 'node';
  el.dataset.id = n.id;

  const group = COLOR_MAP[n.color] || 'g4';
  el.classList.add(group);

  if (n.isTitle) el.classList.add('title-main');
  else if (n.isHeader) el.classList.add('header');
  else if (n.isNote) { el.classList.add('note'); }

  el.style.left = ((n.x + OFFSET_X) * SCALE) + 'px';
  el.style.top  = ((n.y + OFFSET_Y) * SCALE) + 'px';
  el.style.width  = (n.width * SCALE) + 'px';
  el.style.minHeight = (n.height * SCALE) + 'px';

  el.innerHTML = `<div class="node-inner">${n.text}</div>`;
  canvas.appendChild(el);
  n._el = el;
  n._group = group;

  // Click handler
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(n.text, n._group);
  });
});

// Draw edges
function drawEdges() {
  svg.innerHTML = '';
  rawEdges.forEach(edge => {
    const from = nodeMap[edge.from];
    const to = nodeMap[edge.to];
    if (!from || !to) return;

    const fx = (from.x + OFFSET_X + from.width/2) * SCALE + panX;
    const fy = (from.y + OFFSET_Y + from.height/2) * SCALE + panY;
    const tx = (to.x + OFFSET_X + to.width/2) * SCALE + panX;
    const ty = (to.y + OFFSET_Y + to.height/2) * SCALE + panY;

    const color = edgeColorMap[edge.color] || '#A78BFA';

    // Bezier curve
    const dx = tx - fx, dy = ty - fy;
    const cx1 = fx + dx * 0.25;
    const cy1 = fy + dy * 0.1;
    const cx2 = fx + dx * 0.75;
    const cy2 = ty - dy * 0.1;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${fx},${fy} C${cx1},${cy1} ${cx2},${cy2} ${tx},${ty}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.35');
    svg.appendChild(path);
  });
}

// ============================================================
// PANNING
// ============================================================
let panX = 0, panY = 0;
let startX, startY, isPanning = false;

// Initial center
panX = window.innerWidth * 0.5 - (668 + OFFSET_X) * SCALE;
panY = window.innerHeight * 0.5 - (-460 + OFFSET_Y) * SCALE;

function applyPan() {
  canvas.style.transform = `translate(${panX}px, ${panY}px)`;
  svg.style.transform = `translate(0,0)`;
  drawEdges();
}

document.addEventListener('mousedown', e => {
  if (e.target.closest('#modal-overlay') || e.target.closest('#back-btn')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  document.body.classList.add('dragging');
});

document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyPan();
});

document.addEventListener('mouseup', () => {
  isPanning = false;
  document.body.classList.remove('dragging');
});

// ============================================================
// MODAL
// ============================================================
const overlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalType = document.getElementById('modal-type');
const modalBody = document.getElementById('modal-body');
const modal = document.getElementById('modal');

function openModal(rawText, group) {
  const text = rawText;
  const info = PARTICLE_INFO[text];

  // Set gradient vars
  const gc = GROUP_COLORS[group] || GROUP_COLORS.g1;
  modal.style.setProperty('--modal-ca', gc.a);
  modal.style.setProperty('--modal-cb', gc.b);

  modalTitle.textContent = text;
  if (info) {
    modalType.textContent = info.type;
    let html = `<p>${info.desc}</p>`;
    if (info.tags?.length) {
      html += '<div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:4px;">';
      info.tags.forEach(t => { html += `<span class="tag">${t}</span>`; });
      html += '</div>';
    }
    modalBody.innerHTML = html;
  } else {
    modalType.textContent = 'Физическая частица';
    modalBody.innerHTML = '<p>Информация об этой частице скоро будет добавлена.</p>';
  }
  overlay.classList.add('active');
}

document.getElementById('modal-close').addEventListener('click', () => {
  overlay.classList.remove('active');
});
overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('active');
});

// Init
applyPan();
